<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin — Товары</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../shared/runtime-config.js"></script>
  <script src="../shared/supabase-client.js"></script>
  <script src="../shared/domain/constants.js"></script>
  <script src="../shared/domain/access-control.js"></script>
  <script src="../shared/admin.js"></script>
  <link rel="stylesheet" href="../shared/admin.css">
</head>
<body>
<div id="auth-loading"><div class="spinner"></div></div>
<header class="topbar"><a href="adm-dashboard.html" class="brand">Posudamart Admin</a></header>
<main class="container">
  <h1>Каталог товаров (runtime model)</h1>
  <div class="panel"><table><thead><tr><th>Товар</th><th>Артикул</th><th>Категория</th><th>Supplier owner</th><th>Статус</th><th>Цена/кор</th><th>Цена/шт</th></tr></thead><tbody id="tbody"><tr><td colspan="7">Загрузка...</td></tr></tbody></table></div>
</main>
<script>
(async()=>{
  const access=await adminAuthGuard(); if(!access) return;
  const {data,error}=await sb.from('supplier_products').select(`id,is_active,price_per_box,derived_unit_price,supplier_user_id,
    catalog_products!inner(name,article,is_active,catalog_categories(name))`).order('created_at',{ascending:false});
  if(error){document.getElementById('tbody').innerHTML=`<tr><td colspan="7">${error.message}</td></tr>`;return;}
  const rows=data||[];
  document.getElementById('tbody').innerHTML=rows.map(r=>`<tr>
    <td>${r.catalog_products?.name||'—'}</td>
    <td>${r.catalog_products?.article||'—'}</td>
    <td>${r.catalog_products?.catalog_categories?.name||'—'}</td>
    <td>${r.supplier_user_id}</td>
    <td>${(r.is_active && r.catalog_products?.is_active)?'active':'inactive'}</td>
    <td>${Number(r.price_per_box||0).toFixed(2)}</td>
    <td>${Number(r.derived_unit_price||0).toFixed(2)}</td>
  </tr>`).join('') || '<tr><td colspan="7">Нет данных.</td></tr>';
  document.getElementById('auth-loading').style.display='none';
})();
</script>
</body>
</html>
