<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin — Товары</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <link rel="stylesheet" href="../shared/admin.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script>
// Ultra-fast pre-check: hide spinner immediately if we have cached session
(function(){
  const role = localStorage.getItem('adm_role');
  const id = localStorage.getItem('adm_id');
  if (role === 'admin' && id) {
    // Will be verified properly by adminAuthGuard, but hide spinner now
    const style = document.createElement('style');
    style.textContent = '#auth-loading{display:none!important}#main-header,#main-content{display:block!important}';
    document.head.appendChild(style);
  }
})();
</script>

</head>
<body>

<div id="auth-loading" style="position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9998">
  <div style="width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite"></div>
</div>
<div id="toast" style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:10px 22px;border-radius:30px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap"></div>

<div id="login-overlay" style="position:fixed;inset:0;background:var(--bg);z-index:9999;display:none;align-items:center;justify-content:center;padding:20px">
  <div style="background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:36px 32px;width:100%;max-width:400px;box-shadow:0 32px 80px rgba(0,0,0,.5)">
    <div style="text-align:center;margin-bottom:24px">
      <div style="font-size:36px;margin-bottom:10px">🏺</div>
      <div style="font-size:20px;font-weight:800">Posudamart Admin</div>
      <div style="font-size:12px;color:var(--muted);margin-top:4px">Панель администратора</div>
    </div>
    <div id="login-error" style="display:none;padding:10px 14px;border-radius:8px;font-size:13px;font-weight:600;background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;margin-bottom:14px"></div>

    <!-- Step 1: Email -->
    <div id="login-step-email">
      <div style="display:flex;flex-direction:column;gap:5px;margin-bottom:14px">
        <label style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Email администратора</label>
        <input type="email" id="login-email" placeholder="admin@example.com"
          style="background:var(--bg);border:1px solid var(--border2);border-radius:10px;color:var(--text);padding:11px 14px;font-size:15px;outline:none;width:100%;font-family:inherit;transition:border-color .15s"
          onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border2)'"
          onkeydown="if(event.key==='Enter')adminSendOtp()">
      </div>
      <button onclick="adminSendOtp()" id="btn-send-otp"
        style="width:100%;padding:13px;border-radius:12px;border:none;cursor:pointer;font-size:15px;font-weight:700;background:linear-gradient(135deg,#4f6ef7,#6366f1);color:#fff;font-family:inherit;transition:opacity .15s">
        Получить код →
      </button>
    </div>

    <!-- Step 2: OTP -->
    <div id="login-step-otp" style="display:none">
      <div style="font-size:13px;color:var(--muted);text-align:center;margin-bottom:14px">
        Код отправлен на <b id="otp-email-shown" style="color:var(--text)"></b>
      </div>
      <div id="login-otp-wrap" style="display:flex;gap:8px;justify-content:center;margin-bottom:14px">
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric" style="width:46px;height:54px;background:var(--bg);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-size:20px;font-weight:700;text-align:center;outline:none;font-family:var(--mono);transition:all .15s">
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric" style="width:46px;height:54px;background:var(--bg);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-size:20px;font-weight:700;text-align:center;outline:none;font-family:var(--mono);transition:all .15s">
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric" style="width:46px;height:54px;background:var(--bg);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-size:20px;font-weight:700;text-align:center;outline:none;font-family:var(--mono);transition:all .15s">
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric" style="width:46px;height:54px;background:var(--bg);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-size:20px;font-weight:700;text-align:center;outline:none;font-family:var(--mono);transition:all .15s">
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric" style="width:46px;height:54px;background:var(--bg);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-size:20px;font-weight:700;text-align:center;outline:none;font-family:var(--mono);transition:all .15s">
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric" style="width:46px;height:54px;background:var(--bg);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-size:20px;font-weight:700;text-align:center;outline:none;font-family:var(--mono);transition:all .15s">
      </div>
      <button onclick="adminVerifyOtp()" id="btn-verify-otp"
        style="width:100%;padding:13px;border-radius:12px;border:none;cursor:pointer;font-size:15px;font-weight:700;background:linear-gradient(135deg,#4f6ef7,#6366f1);color:#fff;font-family:inherit;margin-bottom:8px">
        Войти →
      </button>
      <div style="text-align:center;font-size:12px;color:var(--muted);margin-top:6px">
        <button id="btn-resend-otp" onclick="adminResendOtp()" disabled
          style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:12px;font-weight:600;font-family:inherit">
          Отправить снова (<span id="resend-timer">60</span>с)
        </button>
      </div>
      <button onclick="document.getElementById('login-step-otp').style.display='none';document.getElementById('login-step-email').style.display='block'"
        style="width:100%;padding:10px;border-radius:10px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;margin-top:8px">
        ← Другой email
      </button>
    </div>
  </div>
</div>

<header class="topbar" id="main-header" style="display:none">
  <div class="brand-group">
    <a href="adm-dashboard.html" class="brand"><div class="brand-dot"></div>Posudamart</a>
    <span class="admin-badge">👑 Админ</span>
  </div>
  <nav class="nav">
    <a href="adm-dashboard.html" class="nav-btn">🏠 Главная</a>
    <a href="adm-suppliers.html" class="nav-btn">🏭 Поставщики</a>
    <a href="adm-categories.html" class="nav-btn">🗂 Категории</a>
    <a href="adm-products.html" class="nav-btn active">📦 Товары</a>
    <a href="adm-catalog.html" class="nav-btn">🛍 Каталог</a>
    <a href="adm-orders.html" class="nav-btn">📋 Заказы</a>
    <a href="adm-history.html" class="nav-btn">📅 История</a>
    <a href="adm-profile.html" class="nav-btn">👤 Профиль</a>
  </nav>
  <div class="topbar-right">
    <span class="user-name" id="admin-email">—</span>
    <button class="btn-logout" onclick="adminSignOut()">Выйти</button>
  </div>
</header>

<main class="container" id="main-content" style="display:none">
  <div class="page-head">
    <h1>Товары (<span id="count">0</span>)</h1>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <input id="search" type="text" placeholder="Поиск..." style="width:180px">
      <select id="filter-sup" style="width:170px"><option value="">Все поставщики</option></select>
      <select id="filter-cat" style="width:160px"><option value="">Все категории</option></select>
      <button class="btn btn-primary" onclick="openEditProd('')">+ Добавить</button>
    </div>
  </div>
  <div class="panel">
    <div class="table-wrap">
      <table style="min-width:750px">
        <thead><tr><th style="width:50px">Фото</th><th>Наименование</th><th>Артикул</th><th>Поставщик</th><th>Категория</th><th>Цена/кор.</th><th>Шт/кор.</th><th>Действия</th></tr></thead>
        <tbody id="tbody"><tr><td colspan="8" class="empty">Загрузка...</td></tr></tbody>
      </table>
    </div>
  </div>
</main>

<!-- Product Modal -->
<div class="modal-backdrop" id="prod-modal">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="prod-modal-title">Добавить товар</div>
      <button class="modal-close" data-close-prod>✕</button>
    </div>
    <input type="hidden" id="prod-id">
    <div class="form-grid">
      <div class="field full">
        <label>Наименование *</label>
        <input type="text" id="prod-name" placeholder="Тарелка обеденная">
      </div>
      <div class="field">
        <label>Артикул (SKU)</label>
        <input type="text" id="prod-sku" placeholder="ART-001">
      </div>
      <div class="field">
        <label>Поставщик</label>
        <select id="prod-supplier"><option value="">— выбери —</option></select>
      </div>
      <div class="field">
        <label>Категория</label>
        <select id="prod-category"><option value="">— выбери —</option></select>
      </div>
      <div class="field">
        <label>Цена за коробку (₸)</label>
        <input type="number" id="prod-price" placeholder="0" min="0" step="0.01">
      </div>
      <div class="field">
        <label>Штук в коробке</label>
        <input type="number" id="prod-units" placeholder="6" min="1" step="1">
      </div>
      <div class="field full">
        <label>Фото</label>
        <input type="file" id="prod-photo-file" accept="image/*">
        <img id="prod-photo-preview" style="width:80px;height:80px;object-fit:cover;border-radius:8px;border:1px solid var(--border);margin-top:8px;display:none">
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" id="btn-save-prod">💾 Сохранить</button>
      <button class="btn" data-close-prod>Отмена</button>
    </div>
  </div>
</div>

<script src="../shared/admin.js"></script>
<script>

let products=[], suppliers=[], categories=[];

async function onAdminLoggedIn() {
  const [p,s,c]=await Promise.all([
    sb.from('products').select('*').order('name'),
    sb.from('suppliers').select('id,name').eq('status','active').order('name'),
    sb.from('categories').select('id,name').order('name')
  ]);
  products=p.data||[]; suppliers=s.data||[]; categories=c.data||[];
  const fSup=document.getElementById('filter-sup');
  const fCat=document.getElementById('filter-cat');
  const mSup=document.getElementById('prod-supplier');
  const mCat=document.getElementById('prod-category');
  suppliers.forEach(s=>{
    fSup.innerHTML+=`<option value="${s.id}">${esc(s.name)}</option>`;
    mSup.innerHTML+=`<option value="${s.id}">${esc(s.name)}</option>`;
  });
  categories.forEach(c=>{
    fCat.innerHTML+=`<option value="${c.id}">${esc(c.name)}</option>`;
    mCat.innerHTML+=`<option value="${c.id}">${esc(c.name)}</option>`;
  });
  render();
  sb.channel('rt-p').on('postgres_changes',{event:'*',schema:'public',table:'products'},async()=>{
    const{data}=await sb.from('products').select('*').order('name');
    products=data||[]; render();
  }).subscribe();
}

function getSup(id){return suppliers.find(x=>x.id===id)?.name||'—'}
function getCat(id){return categories.find(x=>x.id===id)?.name||'—'}

function render() {
  const term=document.getElementById('search').value.toLowerCase();
  const fSup=document.getElementById('filter-sup').value;
  const fCat=document.getElementById('filter-cat').value;
  const filtered=products.filter(p=>{
    const ok=!term||(p.name||'').toLowerCase().includes(term)||(p.sku||'').toLowerCase().includes(term);
    return ok&&(!fSup||p.supplier_id===fSup)&&(!fCat||p.category_id===fCat);
  });
  document.getElementById('count').textContent=filtered.length;
  const tbody=document.getElementById('tbody');
  if(!filtered.length){tbody.innerHTML='<tr><td colspan="8" class="empty"><div class="empty-icon">📦</div>Товары не найдены</td></tr>';return}
  tbody.innerHTML=filtered.map(p=>{
    const photo=p.photo?`<img class="thumb" src="${p.photo}" alt="">`:'<div class="thumb-ph">📦</div>';
    return`<tr>
      <td>${photo}</td>
      <td><strong>${esc(p.name)}</strong></td>
      <td class="mono" style="font-size:11px">${esc(p.sku||'—')}</td>
      <td>${esc(getSup(p.supplier_id))}</td>
      <td>${esc(getCat(p.category_id))}</td>
      <td class="mono">${fmtMoney(p.box_price)}</td>
      <td style="text-align:center">${fmtNum(p.units_per_box)}</td>
      <td><div class="row-actions">
        <button class="btn btn-sm btn-ghost" onclick="openEditProd('${p.id}')">✏</button>
        <button class="btn btn-sm btn-danger" onclick="deleteProd('${p.id}')">✕</button>
      </div></td>
    </tr>`;
  }).join('');
}

function openEditProd(id) {
  const p=products.find(x=>x.id===id)||{};
  document.getElementById('prod-id').value=p.id||'';
  document.getElementById('prod-name').value=p.name||'';
  document.getElementById('prod-sku').value=p.sku||'';
  document.getElementById('prod-supplier').value=p.supplier_id||'';
  document.getElementById('prod-category').value=p.category_id||'';
  document.getElementById('prod-price').value=p.box_price||'';
  document.getElementById('prod-units').value=p.units_per_box||'';
  document.getElementById('prod-photo-preview').src=p.photo||'';
  document.getElementById('prod-photo-preview').style.display=p.photo?'block':'none';
  document.getElementById('prod-modal-title').textContent=p.id?'Редактировать товар':'Добавить товар';
  document.getElementById('prod-modal').classList.add('open');
}
function closeProd(){document.getElementById('prod-modal').classList.remove('open')}

document.getElementById('prod-photo-file').addEventListener('change',async e=>{
  const f=e.target.files[0]; if(!f) return;
  const b64=await resizeImage(f,900);
  document.getElementById('prod-photo-preview').src=b64;
  document.getElementById('prod-photo-preview').style.display='block';
});

document.getElementById('btn-save-prod').addEventListener('click',async()=>{
  const id=document.getElementById('prod-id').value;
  const name=document.getElementById('prod-name').value.trim();
  if(!name)return showToast('Введи название',false);
  const photo=document.getElementById('prod-photo-preview').src;
  const payload={
    name,
    sku:document.getElementById('prod-sku').value.trim()||null,
    supplier_id:document.getElementById('prod-supplier').value||null,
    category_id:document.getElementById('prod-category').value||null,
    box_price:parseFloat(document.getElementById('prod-price').value)||0,
    units_per_box:parseInt(document.getElementById('prod-units').value)||1,
    photo:photo&&photo!==window.location.href?photo:undefined
  };
  Object.keys(payload).forEach(k=>payload[k]===undefined&&delete payload[k]);
  const{error}=id
    ?await sb.from('products').update(payload).eq('id',id)
    :await sb.from('products').insert({...payload,id:crypto.randomUUID()});
  if(error)return showToast(error.message,false);
  closeProd();
  const{data}=await sb.from('products').select('*').order('name');
  products=data||[]; render();
  showToast(id?'✓ Сохранено':'✓ Добавлен товар');
});

async function deleteProd(id) {
  const p=products.find(x=>x.id===id);
  if(!confirm(`Удалить "${p?.name}"?`))return;
  const{error}=await sb.from('products').delete().eq('id',id);
  if(error)return showToast(error.message,false);
  products=products.filter(x=>x.id!==id); render();
  showToast('✓ Удалён');
}

['search','filter-sup','filter-cat'].forEach(id=>document.getElementById(id).addEventListener('input',render));
document.querySelectorAll('[data-close-prod]').forEach(el=>el.addEventListener('click',closeProd));
document.getElementById('prod-modal').addEventListener('click',e=>{if(e.target===document.getElementById('prod-modal'))closeProd()});

(async () => {
  const user = await adminAuthGuard();
  if (user) {
    document.getElementById('main-header').style.display = '';
    document.getElementById('main-content').style.display = '';
    if (typeof onAdminLoggedIn === 'function') await onAdminLoggedIn();
  }
})();
// OTP keyboard wiring
(function() {
  const boxes = document.querySelectorAll('#login-otp-wrap .otp-box');
  boxes.forEach((box, i) => {
    box.addEventListener('input', e => {
      const v = e.target.value.replace(/\D/g,''); e.target.value = v;
      if (v) { e.target.style.borderColor='var(--accent)'; e.target.style.background='rgba(79,110,247,0.08)'; if (i < 5) boxes[i+1].focus(); }
      else { e.target.style.borderColor='var(--border2)'; e.target.style.background='var(--bg)'; }
      if ([...boxes].every(b => b.value)) adminVerifyOtp();
    });
    box.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !box.value && i > 0) { boxes[i-1].focus(); boxes[i-1].value = ''; boxes[i-1].style.borderColor='var(--border2)'; }
    });
    box.addEventListener('paste', e => {
      e.preventDefault();
      const paste = e.clipboardData.getData('text').replace(/\D/g,'').slice(0,6);
      [...paste].forEach((ch,j) => { if(boxes[i+j]) { boxes[i+j].value=ch; boxes[i+j].style.borderColor='var(--accent)'; boxes[i+j].style.background='rgba(79,110,247,0.08)'; } });
      if([...boxes].every(b=>b.value)) adminVerifyOtp();
    });
  });
})();
</script>
</script>
</body>
</html>
