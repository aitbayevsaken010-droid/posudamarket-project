<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin - Каталог</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../shared/runtime-config.js"></script>
  <script src="../shared/supabase-client.js"></script>
  <script src="../shared/domain/constants.js"></script>
  <script src="../shared/domain/access-control.js"></script>
  <script src="../shared/admin.js"></script>
  <link rel="stylesheet" href="../shared/admin.css">
  <style>
    .catalog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
    .catalog-card{border:1px solid var(--border);border-radius:14px;padding:14px;background:var(--surface)}
    .catalog-photo{width:100%;aspect-ratio:1/1;background:var(--surface2);border-radius:10px;overflow:hidden;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
    .catalog-photo img{width:100%;height:100%;object-fit:cover;display:block}
    .section-head{margin:18px 0 10px;font-size:13px;font-weight:800;text-transform:uppercase;color:var(--muted)}
  </style>
</head>
<body>
<div id="auth-loading"><div class="spinner"></div></div>
<header class="topbar" id="main-header" style="display:none">
  <div class="brand-group">
    <a href="adm-dashboard.html" class="brand"><div class="brand-dot"></div>Posudamart</a>
    <span class="admin-badge">Админ</span>
  </div>
  <nav class="nav">
    <a href="adm-dashboard.html" class="nav-btn">Главная</a>
    <a href="adm-catalog.html" class="nav-btn active">Каталог</a>
    <a href="adm-products.html" class="nav-btn">Товары</a>
  </nav>
  <div class="topbar-right">
    <span class="user-name" id="admin-email">-</span>
    <button class="btn-logout" onclick="adminSignOut()">Выйти</button>
  </div>
</header>

<main class="container" id="main-content" style="display:none">
  <div class="page-head">
    <h1>Каталог товаров</h1>
    <input type="text" id="catalog-search" placeholder="Поиск по названию или артикулу" style="max-width:280px">
  </div>

  <div class="panel" id="catalog-state" style="display:none"></div>
  <div id="catalog-content" class="panel">Загрузка...</div>
</main>

<script>
let catalogCategories = [];
let catalogProducts = [];
let catalogImages = [];

function setCatalogState(message, tone = 'muted') {
  const panel = document.getElementById('catalog-state');
  panel.style.display = '';
  panel.style.color = tone === 'danger' ? 'var(--danger)' : 'var(--muted)';
  panel.textContent = message;
}

function getProductImage(productId) {
  const imageRows = catalogImages.filter((image) => image.product_id === productId);
  return imageRows.sort((left, right) => Number(left.sort_order || 0) - Number(right.sort_order || 0))[0] || null;
}

function renderCatalog() {
  const content = document.getElementById('catalog-content');
  const term = String(document.getElementById('catalog-search').value || '').trim().toLowerCase();

  if (!catalogProducts.length && !catalogCategories.length) {
    content.innerHTML = '<div class="empty"><div class="empty-icon">🛍</div>Каталог runtime пока недоступен.</div>';
    return;
  }

  const filteredProducts = catalogProducts.filter((product) => {
    if (!term) return true;
    return `${product.name || ''} ${product.article || ''}`.toLowerCase().includes(term);
  });

  if (!filteredProducts.length) {
    content.innerHTML = '<div class="empty"><div class="empty-icon">🔎</div>Ничего не найдено.</div>';
    return;
  }

  const categoriesById = new Map(catalogCategories.map((category) => [category.id, category]));
  const grouped = new Map();
  filteredProducts.forEach((product) => {
    const key = product.category_id || '__uncategorized__';
    if (!grouped.has(key)) grouped.set(key, []);
    grouped.get(key).push(product);
  });

  const sections = [...grouped.entries()].map(([categoryId, products]) => {
    const category = categoriesById.get(categoryId);
    const title = categoryId === '__uncategorized__' ? 'Без категории' : (category?.name || 'Категория');
    return `
      <div class="section-head">${esc(title)} (${products.length})</div>
      <div class="catalog-grid">
        ${products.map((product) => {
          const image = getProductImage(product.id);
          const safeImage = sanitizeImageUrl(image?.image_url || '');
          return `
            <div class="catalog-card">
              <div class="catalog-photo">
                ${safeImage ? `<img src="${safeImage}" alt="${esc(product.name || 'photo')}">` : '<span style="color:var(--muted)">Нет фото</span>'}
              </div>
              <div style="font-weight:800">${esc(product.name || 'Без названия')}</div>
              <div style="font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:4px">${esc(product.article || '—')}</div>
              <div style="margin-top:8px;color:var(--muted);font-size:12px">Статус: ${product.is_active ? 'active' : 'inactive'}</div>
            </div>
          `;
        }).join('')}
      </div>
    `;
  }).join('');

  content.innerHTML = sections;
}

async function loadCatalogPage() {
  const [categoriesRes, productsRes, imagesRes] = await Promise.all([
    sb.from('catalog_categories').select('id, name, is_active, sort_order').order('sort_order', { ascending: true }).order('name', { ascending: true }),
    sb.from('catalog_products').select('*').order('name', { ascending: true }),
    sb.from('catalog_product_images').select('product_id, image_url, sort_order'),
  ]);

  catalogCategories = categoriesRes.error ? [] : (categoriesRes.data || []);
  catalogProducts = productsRes.error ? [] : (productsRes.data || []);
  catalogImages = imagesRes.error ? [] : (imagesRes.data || []);

  if (categoriesRes.error && productsRes.error) {
    setCatalogState('Новая catalog runtime модель пока недоступна. Страница переведена в safe catalog mode.', 'danger');
  } else if (imagesRes.error) {
    setCatalogState('Изображения каталога временно недоступны. Показываем каталог без фото.');
  }

  renderCatalog();
}

document.getElementById('catalog-search').addEventListener('input', renderCatalog);

(async () => {
  const admin = await adminAuthGuard();
  if (!admin) return;
  showAdminShell();
  try {
    await loadCatalogPage();
  } catch (error) {
    setCatalogState(error?.message || 'Не удалось загрузить каталог.', 'danger');
    document.getElementById('catalog-content').innerHTML = '<div class="empty"><div class="empty-icon">🛍</div>Каталог временно недоступен.</div>';
  }
})();
</script>
</body>
</html>
