<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin - Поставщики</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../shared/runtime-config.js"></script>
  <script src="../shared/supabase-client.js"></script>
  <script src="../shared/domain/constants.js"></script>
  <script src="../shared/domain/access-control.js"></script>
  <link rel="stylesheet" href="../shared/admin.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<div id="auth-loading" style="position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9998">
  <div style="width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite"></div>
</div>
<div id="toast" style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:10px 22px;border-radius:30px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap"></div>

<header class="topbar" id="main-header" style="display:none">
  <div class="brand-group">
    <a href="adm-dashboard.html" class="brand"><div class="brand-dot"></div>Posudamart</a>
    <span class="admin-badge">Админ</span>
  </div>
  <nav class="nav">
    <a href="adm-dashboard.html" class="nav-btn">Главная</a>
    <a href="adm-suppliers.html" class="nav-btn active">Поставщики</a>
    <a href="adm-products.html" class="nav-btn">Товары</a>
  </nav>
  <div class="topbar-right">
    <span class="user-name" id="admin-email">-</span>
    <button class="btn-logout" onclick="adminSignOut()">Выйти</button>
  </div>
</header>

<main class="container" id="main-content" style="display:none">
  <div class="page-head">
    <h1>Поставщики (<span id="count">0</span>)</h1>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <input id="search" type="text" placeholder="Поиск по названию..." style="width:200px">
      <select id="filter-status" style="width:160px">
        <option value="">Все статусы</option>
        <option value="active">Активные</option>
        <option value="pending">На проверке</option>
        <option value="rejected">Отклоненные</option>
      </select>
      <button class="btn btn-primary" onclick="openEditSup('')">+ Добавить</button>
    </div>
  </div>

  <div class="panel" id="suppliers-note" style="display:none"></div>

  <div class="panel">
    <div class="table-wrap">
      <table style="min-width:700px">
        <thead>
          <tr>
            <th style="width:50px">Лого</th>
            <th>Название</th>
            <th>Телефон</th>
            <th>WhatsApp</th>
            <th>Статус</th>
            <th>Товаров</th>
            <th>Действия</th>
          </tr>
        </thead>
        <tbody id="tbody"><tr><td colspan="7" class="empty">Загрузка...</td></tr></tbody>
      </table>
    </div>
  </div>
</main>

<div class="modal-backdrop" id="sup-modal">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">Редактировать поставщика</div>
      <button class="modal-close" data-close-sup>×</button>
    </div>
    <input type="hidden" id="sup-id">
    <div class="form-grid">
      <div class="field full">
        <label>Название *</label>
        <input type="text" id="sup-name" placeholder="ООО Посуда">
      </div>
      <div class="field">
        <label>Телефон</label>
        <input type="tel" id="sup-phone" placeholder="+7 777 123 4567">
      </div>
      <div class="field">
        <label>WhatsApp</label>
        <input type="tel" id="sup-whatsapp" placeholder="+7 777 123 4567">
      </div>
      <div class="field full">
        <label>Адрес</label>
        <input type="text" id="sup-address" placeholder="г. Алматы, ул. ...">
      </div>
      <div class="field">
        <label>Статус</label>
        <select id="sup-status">
          <option value="active">Активен</option>
          <option value="pending">На проверке</option>
          <option value="rejected">Отклонен</option>
        </select>
      </div>
      <div class="field">
        <label>Логотип</label>
        <input type="file" id="sup-logo-file" accept="image/*">
        <img id="sup-logo-preview" style="width:60px;height:60px;object-fit:cover;border-radius:8px;border:1px solid var(--border);margin-top:6px;display:none">
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" id="btn-save-sup">Сохранить</button>
      <button class="btn" data-close-sup>Отмена</button>
    </div>
  </div>
</div>

<script src="../shared/admin.js"></script>
<script>
let suppliers = [];
let products = [];
let productStatsAvailable = false;

function setNote(message) {
  const note = document.getElementById('suppliers-note');
  note.style.display = '';
  note.style.color = 'var(--muted)';
  note.textContent = message;
}

function statusBadgeLocal(status) {
  if (status === 'active') return '<span class="badge badge-active">Активен</span>';
  if (status === 'pending') return '<span class="badge badge-pending">На проверке</span>';
  return '<span class="badge" style="background:rgba(239,68,68,0.12);color:var(--danger);border:1px solid rgba(239,68,68,0.25)">Отклонен</span>';
}

async function onAdminLoggedIn() {
  const suppliersRes = await sb.from('suppliers').select('*').order('name');
  if (suppliersRes.error) {
    document.getElementById('tbody').innerHTML = `<tr><td colspan="7" class="empty">${esc(suppliersRes.error.message)}</td></tr>`;
    return;
  }

  suppliers = suppliersRes.data || [];

  const productsRes = await sb.from('products').select('id, supplier_id');
  if (productsRes.error) {
    products = [];
    productStatsAvailable = false;
    setNote('Статистика legacy products временно недоступна. Показываем supplier list без счетчиков.');
  } else {
    products = productsRes.data || [];
    productStatsAvailable = true;
  }

  render();
}

function render() {
  const term = (document.getElementById('search').value || '').toLowerCase();
  const filterStatus = document.getElementById('filter-status').value;
  const filtered = suppliers.filter((supplier) =>
    (!term || supplier.name?.toLowerCase().includes(term) || supplier.phone?.includes(term)) &&
    (!filterStatus || supplier.status === filterStatus)
  );

  document.getElementById('count').textContent = filtered.length;
  const tbody = document.getElementById('tbody');

  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty"><div class="empty-icon">🏭</div>Поставщики не найдены</td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map((supplier) => {
    const count = products.filter((product) => product.supplier_id === supplier.id).length;
    const countText = productStatsAvailable ? String(count) : '—';
    const safeLogo = sanitizeImageUrl(supplier.logo || '');
    const logo = safeLogo
      ? `<span data-safe-image="${safeLogo}" data-alt="${esc(supplier.name || 'logo')}"></span>`
      : '<div class="thumb-ph">🏭</div>';
    const canDelete = productStatsAvailable ? count === 0 : false;
    return `
      <tr>
        <td>${logo}</td>
        <td><strong>${esc(supplier.name)}</strong><br><span style="font-size:11px;color:var(--muted)">${esc(supplier.address || '')}</span></td>
        <td class="mono">${esc(supplier.phone || '—')}</td>
        <td class="mono">${esc(supplier.whatsapp || '—')}</td>
        <td>${statusBadgeLocal(supplier.status)}</td>
        <td style="text-align:center">${countText}</td>
        <td>
          <div class="row-actions">
            <button class="btn btn-sm btn-ghost" onclick="openEditSup('${supplier.id}')">✏</button>
            <button class="btn btn-sm btn-danger" onclick="deleteSup('${supplier.id}')" ${canDelete ? '' : 'disabled'} title="${canDelete ? 'Удалить' : 'Удаление заблокировано, пока статистика недоступна или есть товары'}">${canDelete ? '×' : '🔒'}</button>
          </div>
        </td>
      </tr>
    `;
  }).join('');

  tbody.querySelectorAll('[data-safe-image]').forEach((host) => {
    const img = document.createElement('img');
    img.className = 'thumb';
    img.src = host.dataset.safeImage;
    if (host.dataset.alt) img.alt = host.dataset.alt;
    host.textContent = '';
    host.appendChild(img);
  });
}

function openEditSup(id) {
  const supplier = suppliers.find((item) => item.id === id) || {};
  document.getElementById('sup-id').value = supplier.id || '';
  document.getElementById('sup-name').value = supplier.name || '';
  document.getElementById('sup-phone').value = supplier.phone || '';
  document.getElementById('sup-whatsapp').value = supplier.whatsapp || '';
  document.getElementById('sup-address').value = supplier.address || '';
  document.getElementById('sup-status').value = supplier.status || 'active';
  document.getElementById('sup-logo-preview').src = supplier.logo || '';
  document.getElementById('sup-logo-preview').style.display = supplier.logo ? 'block' : 'none';
  document.getElementById('sup-modal').classList.add('open');
}

function closeSup() {
  document.getElementById('sup-modal').classList.remove('open');
}

document.getElementById('sup-logo-file').addEventListener('change', async (event) => {
  const file = event.target.files[0];
  if (!file) return;
  const base64 = await resizeImage(file, 600);
  document.getElementById('sup-logo-preview').src = base64;
  document.getElementById('sup-logo-preview').style.display = 'block';
});

document.getElementById('btn-save-sup').addEventListener('click', async () => {
  const id = document.getElementById('sup-id').value;
  const name = document.getElementById('sup-name').value.trim();
  if (!name) return showToast('Введите название', false);

  const logo = document.getElementById('sup-logo-preview').src;
  const payload = {
    name,
    phone: document.getElementById('sup-phone').value.trim(),
    whatsapp: document.getElementById('sup-whatsapp').value.trim(),
    address: document.getElementById('sup-address').value.trim(),
    status: document.getElementById('sup-status').value,
    logo: logo && logo !== window.location.href ? logo : undefined,
  };

  Object.keys(payload).forEach((key) => payload[key] === undefined && delete payload[key]);

  const result = id
    ? await sb.from('suppliers').update(payload).eq('id', id)
    : await sb.from('suppliers').insert({ ...payload, id: crypto.randomUUID() });

  if (result.error) return showToast(result.error.message, false);
  closeSup();
  await onAdminLoggedIn();
  showToast(id ? 'Сохранено' : 'Добавлен поставщик');
});

async function deleteSup(id) {
  const supplier = suppliers.find((item) => item.id === id);
  if (!productStatsAvailable) {
    showToast('Удаление отключено, пока статистика товаров недоступна.', false);
    return;
  }
  const count = products.filter((product) => product.supplier_id === id).length;
  if (count > 0) {
    showToast(`Нельзя удалить: привязано товаров ${count}`, false);
    return;
  }
  if (!confirm(`Удалить "${supplier?.name}"?`)) return;
  const result = await sb.from('suppliers').delete().eq('id', id);
  if (result.error) return showToast(result.error.message, false);
  await onAdminLoggedIn();
  showToast('Удален');
}

document.getElementById('search').addEventListener('input', render);
document.getElementById('filter-status').addEventListener('change', render);
document.querySelectorAll('[data-close-sup]').forEach((button) => button.addEventListener('click', closeSup));
document.getElementById('sup-modal').addEventListener('click', (event) => {
  if (event.target === document.getElementById('sup-modal')) closeSup();
});

(async () => {
  const admin = await adminAuthGuard();
  if (!admin) return;
  showAdminShell();
  await onAdminLoggedIn();
})();
</script>
</body>
</html>
