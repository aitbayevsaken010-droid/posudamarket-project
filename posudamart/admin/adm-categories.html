<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin — Категории</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../shared/runtime-config.js"></script>
  <script src="../shared/supabase-client.js"></script>
  <script src="../shared/domain/constants.js"></script>
  <script src="../shared/domain/access-control.js"></script>
  <link rel="stylesheet" href="../shared/admin.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<div id="auth-loading" style="position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9998">
  <div style="width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite"></div>
</div>
<div id="toast" style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:10px 22px;border-radius:30px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap"></div>

<header class="topbar" id="main-header" style="display:none">
  <div class="brand-group">
    <a href="adm-dashboard.html" class="brand"><div class="brand-dot"></div>Posudamart</a>
    <span class="admin-badge">👑 Админ</span>
  </div>
  <nav class="nav">
    <a href="adm-dashboard.html" class="nav-btn">🏠 Главная</a>
    <a href="adm-suppliers.html" class="nav-btn">🏭 Поставщики</a>
    <a href="adm-categories.html" class="nav-btn active">🗂 Категории</a>
    <a href="adm-products.html" class="nav-btn">📦 Товары</a>
    <a href="adm-catalog.html" class="nav-btn">🛍 Каталог</a>
    <a href="adm-orders.html" class="nav-btn">📋 Заказы</a>
    <a href="adm-history.html" class="nav-btn">📅 История</a>
    <a href="adm-profile.html" class="nav-btn">👤 Профиль</a>
  </nav>
  <div class="topbar-right">
    <span class="user-name" id="admin-email">—</span>
    <button class="btn-logout" onclick="adminSignOut()">Выйти</button>
  </div>
</header>

<main class="container" id="main-content" style="display:none">

  <div class="page-head"><h1>Категории</h1></div>
  <div style="display:grid;grid-template-columns:320px 1fr;gap:16px;align-items:start">
    <div class="panel">
      <div class="panel-title">Добавить / Редактировать</div>
      <input type="hidden" id="cat-id">
      <div class="field"><label>Название *</label><input type="text" id="cat-name" placeholder="Например: Кастрюли"></div>
      <div class="form-actions">
        <button class="btn btn-primary" id="btn-save-cat">Сохранить</button>
        <button class="btn btn-ghost" onclick="resetCatForm()">Очистить</button>
      </div>
    </div>
    <div class="panel">
      <div class="panel-title">Список (<span id="count">0</span>)</div>
      <div class="table-wrap">
        <table><thead><tr><th>Название</th><th>Товаров</th><th style="width:80px">Действия</th></tr></thead>
        <tbody id="tbody"><tr><td colspan="3" class="empty">Загрузка...</td></tr></tbody></table>
      </div>
    </div>
  </div>
  <style>@media(max-width:800px){#main-content>div:last-child{grid-template-columns:1fr!important}}</style>
</main>

<script src="../shared/admin.js"></script>
<script>
let categories=[], products=[];

async function onAdminLoggedIn() {
  await load();
}

async function load() {
  const [c,p]=await Promise.all([
    sb.from('categories').select('*').order('name'),
    sb.from('products').select('id,category_id')
  ]);
  categories=c.data||[]; products=p.data||[]; render();
}

function render() {
  document.getElementById('count').textContent=categories.length;
  const tbody=document.getElementById('tbody');
  if(!categories.length){tbody.innerHTML='<tr><td colspan="3" class="empty"><div class="empty-icon">🗂</div>Нет категорий</td></tr>';return}
  tbody.innerHTML=categories.map(c=>{
    const cnt=products.filter(p=>p.category_id===c.id).length;
    return`<tr>
      <td><strong>${esc(c.name)}</strong></td>
      <td style="text-align:center">${cnt}</td>
      <td><div class="row-actions">
        <button class="btn btn-sm btn-ghost" onclick="editCat('${c.id}')">✏</button>
        <button class="btn btn-sm btn-danger" onclick="delCat('${c.id}')" ${cnt>0?'disabled title="Используется в товарах"':''}>✕</button>
      </div></td>
    </tr>`;
  }).join('');
}

function resetCatForm(){document.getElementById('cat-id').value='';document.getElementById('cat-name').value='';document.getElementById('btn-save-cat').textContent='Сохранить';}
function editCat(id){const c=categories.find(x=>x.id===id);if(!c)return;document.getElementById('cat-id').value=c.id;document.getElementById('cat-name').value=c.name;document.getElementById('btn-save-cat').textContent='Обновить';document.getElementById('cat-name').focus();}

async function delCat(id){
  const c=categories.find(x=>x.id===id);if(!c)return;
  // Проверяем есть ли товары в этой категории
  const{data:prods}=await sb.from('products').select('id').eq('category_id',id).limit(1);
  if(prods&&prods.length>0)return showToast('Нельзя удалить: есть товары в этой категории',false);
  if(!confirm(`Удалить "${c.name}"?`))return;
  const{error}=await sb.from('categories').delete().eq('id',id);
  if(error)return showToast(error.message,false);
  await load(); showToast('✓ Удалено');
}

document.getElementById('btn-save-cat').addEventListener('click',async()=>{
  const name=document.getElementById('cat-name').value.trim();
  if(!name)return showToast('Введи название',false);
  const editId=document.getElementById('cat-id').value;
  if(categories.find(c=>c.name.toLowerCase()===name.toLowerCase()&&c.id!==editId))
    return showToast('Такая категория уже есть',false);
  const{error}=editId
    ?await sb.from('categories').update({name}).eq('id',editId)
    :await sb.from('categories').insert({id:crypto.randomUUID(),name});
  if(error)return showToast(error.message,false);
  await load(); resetCatForm();
  showToast(editId?'✓ Обновлено':'✓ Добавлено');
});

document.getElementById('cat-name').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('btn-save-cat').click()});

(async () => {
  const user = await adminAuthGuard();
  if (user) {
    document.getElementById('main-header').style.display = '';
    document.getElementById('main-content').style.display = '';
    if (typeof onAdminLoggedIn === 'function') await onAdminLoggedIn();
  }
})();
</script>
</script>
</body>
</html>
