<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Admin — Категории</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../shared/runtime-config.js"></script><script src="../shared/supabase-client.js"></script><script src="../shared/domain/constants.js"></script><script src="../shared/domain/access-control.js"></script><script src="../shared/admin.js"></script><link rel="stylesheet" href="../shared/admin.css"></head>
<body><div id="auth-loading"><div class="spinner"></div></div><main class="container"><h1>Категории каталога</h1><div class="panel"><table><thead><tr><th>Категория</th><th>Статус</th><th>Товаров</th></tr></thead><tbody id="tb"></tbody></table></div></main>
<script>
(async()=>{const a=await adminAuthGuard(); if(!a) return; const [c,p]=await Promise.all([sb.from('catalog_categories').select('id,name,is_active').order('name'),sb.from('catalog_products').select('id,category_id')]); if(c.error||p.error){document.getElementById('tb').innerHTML='<tr><td colspan="3">Ошибка загрузки</td></tr>';return;} const prods=p.data||[]; document.getElementById('tb').innerHTML=(c.data||[]).map(x=>`<tr><td>${x.name}</td><td>${x.is_active?'active':'inactive'}</td><td>${prods.filter(i=>i.category_id===x.id).length}</td></tr>`).join(''); document.getElementById('auth-loading').style.display='none';})();
</script></body></html>
