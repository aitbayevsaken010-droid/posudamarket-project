<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin — История</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../shared/runtime-config.js"></script>
  <script src="../shared/supabase-client.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link rel="stylesheet" href="../shared/admin.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<div id="auth-loading" style="position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9998">
  <div style="width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite"></div>
</div>
<div id="toast" style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:10px 22px;border-radius:30px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap"></div>

<header class="topbar" id="main-header" style="display:none">
  <div class="brand-group">
    <a href="adm-dashboard.html" class="brand"><div class="brand-dot"></div>Posudamart</a>
    <span class="admin-badge">👑 Админ</span>
  </div>
  <nav class="nav">
    <a href="adm-dashboard.html" class="nav-btn">🏠 Главная</a>
    <a href="adm-suppliers.html" class="nav-btn">🏭 Поставщики</a>
    <a href="adm-categories.html" class="nav-btn">🗂 Категории</a>
    <a href="adm-products.html" class="nav-btn">📦 Товары</a>
    <a href="adm-catalog.html" class="nav-btn">🛍 Каталог</a>
    <a href="adm-orders.html" class="nav-btn">📋 Заказы</a>
    <a href="adm-history.html" class="nav-btn active">📅 История</a>
    <a href="adm-profile.html" class="nav-btn">👤 Профиль</a>
  </nav>
  <div class="topbar-right">
    <span class="user-name" id="admin-email">—</span>
    <button class="btn-logout" onclick="adminSignOut()">Выйти</button>
  </div>
</header>

<main class="container" id="main-content" style="display:none">
  <div class="page-head">
    <h1>История заказов</h1>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <input id="search" type="text" placeholder="Поиск..." style="width:160px">
      <select id="filter-sup" style="width:170px"><option value="">Все поставщики</option></select>
      <input id="date-from" type="date" style="width:140px" title="Дата от">
      <input id="date-to" type="date" style="width:140px" title="Дата до">
      <button class="btn btn-ghost btn-sm" id="btn-reset">✕ Сбросить</button>
    </div>
  </div>
  <div class="panel" style="margin-bottom:12px;padding:14px 20px">
    <div style="display:flex;gap:24px;align-items:center;flex-wrap:wrap">
      <div style="font-size:13px;color:var(--muted)">Заказов: <strong style="color:var(--text)" id="count">0</strong></div>
      <div style="font-size:13px;color:var(--muted)">Сумма: <strong style="color:var(--accent);font-family:var(--mono)" id="total-sum">0 ₸</strong></div>
    </div>
  </div>
  <div id="history-container"></div>
</main>

<!-- Модальное окно заказа (история) -->
<div class="modal-backdrop" id="hist-order-modal">
  <div class="modal" style="max-width:640px">
    <div class="modal-head">
      <div class="modal-title" id="hist-modal-title">Заказ</div>
      <button class="modal-close" onclick="closeHistModal()">✕</button>
    </div>
    <div id="hist-modal-sup-info" style="background:var(--surface2);border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px;display:flex;gap:24px;flex-wrap:wrap"></div>
    <div id="hist-modal-items"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)">
      <div style="font-size:15px;font-weight:800" id="hist-modal-total"></div>
      <button class="btn btn-sm" style="background:rgba(245,158,11,0.12);border-color:var(--warning);color:var(--warning)" id="hist-modal-pdf">🖨 Накладная</button>
    </div>
  </div>
</div>

<script src="../shared/admin.js"></script>
<script>

let orders=[], suppliers=[], products=[];
function mountSafeImages(root){
  root.querySelectorAll('[data-safe-image]').forEach(host=>{
    const safe=sanitizeImageUrl(host.dataset.safeImage||'');
    if(!safe) return;
    const img=document.createElement('img');
    img.src=safe;
    if(host.dataset.alt) img.alt=host.dataset.alt;
    img.style.width='36px';
    img.style.height='36px';
    img.style.borderRadius='6px';
    img.style.objectFit='cover';
    img.style.border='1px solid var(--border)';
    img.style.flexShrink='0';
    host.textContent='';
    host.appendChild(img);
  });
}

async function onAdminLoggedIn() {
  const [o,s,p]=await Promise.all([
    sb.from('orders').select('*').eq('archived',true).order('date',{ascending:false}),
    sb.from('suppliers').select('id,name,phone,whatsapp,address').order('name'),
    sb.from('products').select('id,name,sku,photo').order('name')
  ]);
  orders=o.data||[]; suppliers=s.data||[]; products=p.data||[];
  suppliers.forEach(s=>document.getElementById('filter-sup').innerHTML+=`<option value="${s.id}">${esc(s.name)}</option>`);
  render();
}

function getSup(id){return suppliers.find(x=>x.id===id)||{name:'—'}}
function getProd(id){return products.find(x=>x.id===id)||{}}

const expandedHistSups = new Set();

function render() {
  const term  = document.getElementById('search').value.toLowerCase();
  const fSup  = document.getElementById('filter-sup').value;
  const dFrom = document.getElementById('date-from').value;
  const dTo   = document.getElementById('date-to').value;
  const filtered = orders.filter(o => {
    const sup = getSup(o.supplier_id);
    const ok  = !term || (o.number||'').toLowerCase().includes(term) || sup.name.toLowerCase().includes(term);
    const inSup  = !fSup  || o.supplier_id === fSup;
    const inDate = (!dFrom || o.date >= dFrom) && (!dTo || o.date <= dTo);
    return ok && inSup && inDate;
  });
  const total_sum = filtered.reduce((s,o) => s + (o.items||[]).reduce((ss,i) => ss+Number(i.totalPrice||0), 0), 0);
  document.getElementById('total-sum').textContent = fmtMoney(total_sum);
  document.getElementById('count').textContent = filtered.length;

  const container = document.getElementById('history-container');
  if (!filtered.length) {
    container.innerHTML = '<div class="panel"><div class="empty"><div class="empty-icon">📅</div>История пуста</div></div>';
    return;
  }

  // Группируем по поставщику
  const grouped = {};
  filtered.forEach(o => {
    const key = o.supplier_id || '__none__';
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(o);
  });

  let html = '';
  for (const [supId, grpOrders] of Object.entries(grouped)) {
    const sup    = getSup(supId);
    const grpSum = grpOrders.reduce((s,o) => s + (o.items||[]).reduce((ss,i) => ss+Number(i.totalPrice||0), 0), 0);
    const isOpen = expandedHistSups.has(supId);
    const safeLogo = sanitizeImageUrl(sup.logo||'');
    const logo   = safeLogo
      ? `<span data-safe-image="${safeLogo}" data-alt="${esc(sup.name||'logo')}"></span>`
      : `<div style="width:36px;height:36px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">🏭</div>`;

    html += `
    <div class="panel" style="margin-bottom:12px;padding:0;overflow:hidden">
      <div onclick="toggleHistSup('${supId}')" style="display:flex;align-items:center;gap:14px;padding:14px 18px;cursor:pointer;user-select:none" onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background=''">
        ${logo}
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:15px">${esc(sup.name)}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px">${grpOrders.length} заказ(ов) · ${fmtMoney(grpSum)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          ${supId!=='__none__'?`<button class="btn btn-sm" style="background:rgba(245,158,11,0.12);border-color:var(--warning);color:var(--warning)" onclick="event.stopPropagation();printSupplierOrders('${supId}')">🖨 Сводная</button>`:''}
          <span style="color:var(--muted);font-size:18px;${isOpen?'transform:rotate(180deg)':''}">▾</span>
        </div>
      </div>
      <div id="hist-group-${supId}" style="display:${isOpen?'block':'none'};border-top:1px solid var(--border)">
        <table style="width:100%;border-collapse:collapse">
          <thead>
            <tr style="background:var(--surface2)">
              <th style="padding:8px 18px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;text-align:left">Номер</th>
              <th style="padding:8px 12px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;text-align:left">Дата</th>
              <th style="padding:8px 12px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;text-align:center">Позиций</th>
              <th style="padding:8px 12px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;text-align:right">Сумма</th>
              <th style="padding:8px 18px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;text-align:right">Действия</th>
            </tr>
          </thead>
          <tbody>
            ${grpOrders.map(o => {
              const sum = (o.items||[]).reduce((s,i)=>s+Number(i.totalPrice||0),0);
              return `<tr onclick="openHistModal('${o.id}')" style="cursor:pointer;border-top:1px solid var(--border)" onmouseover="this.style.background='rgba(79,110,247,0.06)'" onmouseout="this.style.background=''">
                <td style="padding:12px 18px;font-family:var(--mono);font-size:13px"><strong>#${esc(o.number)}</strong></td>
                <td style="padding:12px 12px;font-size:13px;color:var(--muted)">${esc(o.date)}</td>
                <td style="padding:12px 12px;text-align:center;color:var(--muted);font-size:13px">${(o.items||[]).length}</td>
                <td style="padding:12px 12px;text-align:right;font-family:var(--mono);font-size:13px;font-weight:700">${fmtMoney(sum)}</td>
                <td style="padding:12px 18px;text-align:right" onclick="event.stopPropagation()">
                  <div style="display:flex;gap:6px;justify-content:flex-end">
                    <button class="btn btn-sm" style="background:rgba(245,158,11,0.12);border-color:var(--warning);color:var(--warning)" onclick="printOrderById('${o.id}')">🖨</button>
                    <button class="btn btn-sm btn-danger" onclick="delOrder('${o.id}')">✕</button>
                  </div>
                </td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
  }
  container.innerHTML = html;
  mountSafeImages(container);
}

function toggleHistSup(supId) {
  if (expandedHistSups.has(supId)) expandedHistSups.delete(supId);
  else expandedHistSups.add(supId);
  render();
}

// ── Модальное окно истории ──
function openHistModal(id) {
  const o = orders.find(x => x.id === id);
  if (!o) return;
  const sup   = getSup(o.supplier_id);
  const total = (o.items||[]).reduce((s,i)=>s+Number(i.totalPrice||0),0);

  document.getElementById('hist-modal-title').textContent = `Заказ #${o.number}`;
  document.getElementById('hist-modal-sup-info').innerHTML = `
    <div><span style="color:var(--muted);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px">Поставщик</span><div style="font-weight:700;margin-top:3px">${esc(sup.name)}</div></div>
    ${sup.phone?`<div><span style="color:var(--muted);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px">Телефон</span><div style="font-weight:600;margin-top:3px">${esc(sup.phone)}</div></div>`:''}
    ${sup.whatsapp?`<div><span style="color:var(--muted);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px">WhatsApp</span><div style="font-weight:600;margin-top:3px">${esc(sup.whatsapp)}</div></div>`:''}
    <div><span style="color:var(--muted);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px">Дата</span><div style="font-weight:600;margin-top:3px">${esc(o.date)}</div></div>
  `;
  const items = o.items || [];
  document.getElementById('hist-modal-items').innerHTML = items.length ? `
    <div style="overflow-x:auto;border-radius:10px;border:1px solid var(--border)">
      <table style="width:100%;border-collapse:collapse;min-width:400px">
        <thead>
          <tr style="background:var(--surface2)">
            <th style="padding:8px 12px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;text-align:left">Товар</th>
            <th style="padding:8px 12px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;text-align:center">Кор.</th>
            <th style="padding:8px 12px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;text-align:center">Всего шт</th>
            <th style="padding:8px 12px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;text-align:right">Сумма</th>
          </tr>
        </thead>
        <tbody>
          ${items.map((item,idx) => {
            const prod = getProd(item.productId||'');
            const safePhoto = sanitizeImageUrl(prod.photo||item._photo||'');
            const photo = safePhoto
              ? `<span data-safe-image="${safePhoto}" data-alt="${esc(item.productName||'photo')}"></span>`
              : `<div style="width:36px;height:36px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">📦</div>`;
            return `<tr style="${idx>0?'border-top:1px solid var(--border)':''}">
              <td style="padding:10px 12px">
                <div style="display:flex;align-items:center;gap:10px">
                  ${photo}
                  <div>
                    <div style="font-weight:600;font-size:13px">${esc(item.productName||'—')}</div>
                    ${(prod.sku||item.sku)?`<div style="font-size:11px;color:var(--muted);font-family:var(--mono)">${esc(prod.sku||item.sku)}</div>`:''}
                  </div>
                </div>
              </td>
              <td style="padding:10px 12px;text-align:center;font-weight:700">${item.boxes}</td>
              <td style="padding:10px 12px;text-align:center;color:var(--muted)">${item.totalUnits}</td>
              <td style="padding:10px 12px;text-align:right;font-family:var(--mono);font-weight:700">${fmtMoney(item.totalPrice)}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  ` : '<div class="empty"><div class="empty-icon">📦</div>Товаров нет</div>';
  mountSafeImages(document.getElementById('hist-modal-items'));

  document.getElementById('hist-modal-total').innerHTML = `Итого: <span style="color:var(--accent)">${fmtMoney(total)}</span>`;
  document.getElementById('hist-modal-pdf').onclick = () => { closeHistModal(); printOrderById(o.id); };
  document.getElementById('hist-order-modal').classList.add('open');
}

function closeHistModal() {
  document.getElementById('hist-order-modal').classList.remove('open');
}
document.addEventListener('DOMContentLoaded', () => {
  const m = document.getElementById('hist-order-modal');
  if (m) m.addEventListener('click', e => { if (e.target === m) closeHistModal(); });
});


async function generateOrderPdf(orders, sup, filename) {
  const allItems = [];
  orders.forEach(o => (o.items||[]).forEach(i => {
    const prod = products.find(p => p.id === (i.productId||'')) || {};
    allItems.push({...i, orderNumber: o.number, orderDate: o.date,
      _photo: prod.photo || '', _sku: prod.sku || i.sku || ''});
  }));

  const totalBoxes = allItems.reduce((s,i)=>s+Number(i.boxes||0),0);
  const totalUnits = allItems.reduce((s,i)=>s+Number(i.totalUnits||0),0);
  const totalPrice = allItems.reduce((s,i)=>s+Number(i.totalPrice||0),0);

  const isSingle = orders.length === 1;
  const title = isSingle ? `Накладная #${esc(orders[0].number)}` : `Сводный заказ — ${esc(sup?.name||'')}`;

  const metaLines = [];
  if (sup?.name)     metaLines.push(`<b>Поставщик:</b> ${esc(sup.name)}`);
  if (sup?.phone)    metaLines.push(`<b>Телефон:</b> ${esc(sup.phone)}`);
  if (sup?.whatsapp) metaLines.push(`<b>WhatsApp:</b> ${esc(sup.whatsapp)}`);
  if (isSingle && orders[0].date) metaLines.push(`<b>Дата:</b> ${orders[0].date}`);
  if (!isSingle)     metaLines.push(`<b>Заказы:</b> ${orders.map(o=>'#'+o.number).join(', ')}`);
  metaLines.push(`<b>Сформировано:</b> ${new Date().toLocaleString('ru-RU')}`);

  const rows = allItems.map((item, idx) => {
    const photoCell = item._photo
      ? `<img src="${item._photo}" style="width:48px;height:48px;object-fit:cover;border-radius:6px;border:1px solid #ddd;display:block" crossorigin="anonymous">`
      : `<div style="width:48px;height:48px;background:#f0f0f0;border-radius:6px;border:1px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:20px">?</div>`;
    return `<tr style="border-bottom:1px solid #eee;${idx%2===1?'background:#f9f9fc':''}">
      <td style="padding:8px 6px;color:#888;vertical-align:middle">${idx+1}</td>
      <td style="padding:8px 6px;vertical-align:middle">${photoCell}</td>
      <td style="padding:8px 6px;vertical-align:middle"><b style="font-size:12px">${esc(item.productName)}</b></td>
      <td style="padding:8px 6px;vertical-align:middle;color:#555;font-family:monospace;font-size:11px">${esc(item._sku||'—')}</td>
      <td style="padding:8px 6px;text-align:center;vertical-align:middle;font-weight:bold">${item.boxes}</td>
      <td style="padding:8px 6px;text-align:center;vertical-align:middle;color:#555">${item.unitsPerBox}</td>
      <td style="padding:8px 6px;text-align:center;vertical-align:middle;font-weight:bold">${item.totalUnits}</td>
      <td style="padding:8px 6px;text-align:right;vertical-align:middle;color:#555">${Number(item.boxPrice).toLocaleString('ru-RU')} ₸</td>
      <td style="padding:8px 6px;text-align:right;vertical-align:middle;font-weight:bold">${Number(item.totalPrice).toLocaleString('ru-RU')} ₸</td>
    </tr>`;
  }).join('');

  const html = `<div style="font-family:Arial,sans-serif;color:#111;font-size:12px;padding:28px;width:780px;background:#fff">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
      <h2 style="margin:0;font-size:22px;font-weight:900">${title}</h2>
      <div style="font-size:10px;color:#888;text-align:right;line-height:1.7">${new Date().toLocaleString('ru-RU')}</div>
    </div>
    <div style="margin-bottom:16px;line-height:1.9;font-size:12px;padding:12px 16px;background:#f5f5f8;border-radius:8px">${metaLines.join('<br>')}</div>
    <table style="width:100%;border-collapse:collapse;margin-bottom:16px">
      <thead>
        <tr style="background:#1e2334;color:#fff">
          <th style="padding:8px 6px;text-align:left;width:24px">№</th>
          <th style="padding:8px 6px;text-align:left;width:56px">ФОТО</th>
          <th style="padding:8px 6px;text-align:left">НАИМЕНОВАНИЕ</th>
          <th style="padding:8px 6px;text-align:left;width:80px">АРТИКУЛ</th>
          <th style="padding:8px 6px;text-align:center;width:40px">КОР.</th>
          <th style="padding:8px 6px;text-align:center;width:40px">ШТ/К</th>
          <th style="padding:8px 6px;text-align:center;width:50px">ВСЕГО</th>
          <th style="padding:8px 6px;text-align:right;width:80px">ЦЕНА/КОР.</th>
          <th style="padding:8px 6px;text-align:right;width:80px">СУММА</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
      <tfoot>
        <tr style="background:#e8ecf4;font-weight:bold;font-size:13px">
          <td colspan="4" style="padding:10px 6px;border-top:2px solid #ccc">ИТОГО</td>
          <td style="padding:10px 6px;text-align:center;border-top:2px solid #ccc">${totalBoxes}</td>
          <td style="border-top:2px solid #ccc"></td>
          <td style="padding:10px 6px;text-align:center;border-top:2px solid #ccc">${totalUnits}</td>
          <td style="border-top:2px solid #ccc"></td>
          <td style="padding:10px 6px;text-align:right;border-top:2px solid #ccc;font-size:15px;color:#1e2334">${Number(totalPrice).toLocaleString('ru-RU')} ₸</td>
        </tr>
      </tfoot>
    </table>
    <div style="color:#aaa;font-size:10px;text-align:center">Документ сформирован автоматически</div>
  </div>`;

  showToast('⏳ Генерируем PDF...');
  const wrap = document.createElement('div');
  wrap.style.cssText = 'position:fixed;left:-9999px;top:0;z-index:-1;background:#fff';
  wrap.innerHTML = html;
  document.body.appendChild(wrap);
  try {
    const canvas = await html2canvas(wrap.firstElementChild, {
      scale: 2, useCORS: true, allowTaint: true, backgroundColor: '#fff', logging: false
    });
    const imgData = canvas.toDataURL('image/jpeg', 0.95);
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const pageW = 210, pageH = 297;
    const imgH = (canvas.height * pageW) / canvas.width;
    let posY = 0, page = 0;
    while (posY < imgH) {
      if (page > 0) doc.addPage();
      doc.addImage(imgData, 'JPEG', 0, -posY, pageW, imgH);
      posY += pageH; page++;
    }
    const pdfBlob = doc.output('blob');
    const pdfFile = new File([pdfBlob], filename, { type: 'application/pdf' });
    const canShare = navigator.share && navigator.canShare && navigator.canShare({ files: [pdfFile] });
    if (canShare) { await navigator.share({ files: [pdfFile], title: filename }); }
    else { doc.save(filename); }
    showToast('✅ PDF готов!');
  } catch(e) {
    showToast('Ошибка генерации PDF: ' + e.message, false);
    console.error('PDF error:', e);
  } finally {
    document.body.removeChild(wrap);
  }
}

function printOrderById(id) {
  const o = orders.find(x => x.id === id);
  if (!o?.items?.length) return showToast('В заказе нет товаров', false);
  const sup = getSup(o.supplier_id);
  generateOrderPdf([o], sup, `nakladnaya_${o.number}.pdf`);
}

function printSupplierOrders(supId) {
  const sup = getSup(supId);
  const supOrders = orders.filter(o => o.supplier_id === supId)
    .sort((a,b) => a.date.localeCompare(b.date) || a.number.localeCompare(b.number));
  if (!supOrders.length) return showToast('Нет заказов', false);
  const nums = supOrders.map(o => o.number).join('_');
  generateOrderPdf(supOrders, sup, `zakaz_${sup.name||'supplier'}_${nums}.pdf`);
}

['search','filter-sup','date-from','date-to'].forEach(id=>
  document.getElementById(id).addEventListener('input',render));
document.getElementById('btn-reset').addEventListener('click',()=>{
  ['search','filter-sup','date-from','date-to'].forEach(id=>document.getElementById(id).value='');
  render();
