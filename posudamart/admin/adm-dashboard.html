<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin — Главная</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../shared/runtime-config.js"></script>
  <script src="../shared/supabase-client.js"></script>
  <script src="../shared/domain/constants.js"></script>
  <script src="../shared/domain/access-control.js"></script>
  <link rel="stylesheet" href="../shared/admin.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<div id="auth-loading" style="position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9998">
  <div style="width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite"></div>
</div>
<div id="toast" style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:10px 22px;border-radius:30px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap"></div>

<header class="topbar" id="main-header" style="display:none">
  <div class="brand-group">
    <a href="adm-dashboard.html" class="brand"><div class="brand-dot"></div>Posudamart</a>
    <span class="admin-badge">👑 Админ</span>
  </div>
  <nav class="nav">
    <a href="adm-dashboard.html" class="nav-btn active">🏠 Главная</a>
    <a href="adm-suppliers.html" class="nav-btn ">🏭 Поставщики</a>
    <a href="adm-categories.html" class="nav-btn ">🗂 Категории</a>
    <a href="adm-products.html" class="nav-btn ">📦 Товары</a>
    <a href="adm-catalog.html" class="nav-btn ">🛍 Каталог</a>
    <a href="adm-orders.html" class="nav-btn ">📋 Заказы</a>
    <a href="adm-history.html" class="nav-btn ">📅 История</a>
    <a href="adm-profile.html" class="nav-btn ">👤 Профиль</a>
  </nav>
  <div class="topbar-right">
    <span class="user-name" id="admin-email">—</span>
    <button class="btn-logout" onclick="adminSignOut()">Выйти</button>
  </div>
</header>

<main class="container" id="main-content" style="display:none">

  <div class="page-head">
    <h1>Панель управления</h1>
    <span id="mod-badge" style="display:none;background:var(--danger);color:#fff;border-radius:99px;padding:4px 14px;font-size:13px;font-weight:700"></span>
  </div>
  <div class="dashboard-stats" style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px">
    <div class="panel"><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Поставщиков</div><div style="font-size:28px;font-weight:800;color:var(--accent)" id="stat-suppliers">—</div></div>
    <div class="panel"><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Категорий</div><div style="font-size:28px;font-weight:800" id="stat-categories">—</div></div>
    <div class="panel"><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Товаров</div><div style="font-size:28px;font-weight:800" id="stat-products">—</div></div>
    <div class="panel"><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Активных заказов</div><div style="font-size:28px;font-weight:800;color:var(--warning)" id="stat-orders">—</div></div>
  </div>
  <div class="dashboard-links" style="display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:24px">
    <a href="adm-suppliers.html" class="panel" style="text-align:center;text-decoration:none;color:var(--text);transition:all .15s;cursor:pointer" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'"><div style="font-size:26px;margin-bottom:6px">🏭</div><div style="font-size:12px;font-weight:600;color:var(--muted)">Поставщики</div></a>
    <a href="adm-categories.html" class="panel" style="text-align:center;text-decoration:none;color:var(--text);transition:all .15s;cursor:pointer" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'"><div style="font-size:26px;margin-bottom:6px">🗂</div><div style="font-size:12px;font-weight:600;color:var(--muted)">Категории</div></a>
    <a href="adm-products.html" class="panel" style="text-align:center;text-decoration:none;color:var(--text);transition:all .15s;cursor:pointer" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'"><div style="font-size:26px;margin-bottom:6px">📦</div><div style="font-size:12px;font-weight:600;color:var(--muted)">Товары</div></a>
    <a href="adm-catalog.html" class="panel" style="text-align:center;text-decoration:none;color:var(--text);transition:all .15s;cursor:pointer" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'"><div style="font-size:26px;margin-bottom:6px">🛍</div><div style="font-size:12px;font-weight:600;color:var(--muted)">Каталог</div></a>
    <a href="adm-orders.html" class="panel" style="text-align:center;text-decoration:none;color:var(--text);transition:all .15s;cursor:pointer" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'"><div style="font-size:26px;margin-bottom:6px">📋</div><div style="font-size:12px;font-weight:600;color:var(--muted)">Заказы</div></a>
    <a href="adm-history.html" class="panel" style="text-align:center;text-decoration:none;color:var(--text);transition:all .15s;cursor:pointer" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'"><div style="font-size:26px;margin-bottom:6px">📅</div><div style="font-size:12px;font-weight:600;color:var(--muted)">История</div></a>
  </div>
  <div class="panel" id="mod-panel" style="display:none">
    <div class="panel-title">⏳ Заявки на модерацию</div>
    <div id="mod-list"></div>
  </div>
  <style>.dashboard-stats{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))!important}.dashboard-links{grid-template-columns:repeat(auto-fit,minmax(140px,1fr))!important}@media(max-width:600px){.dashboard-links{grid-template-columns:repeat(2,1fr)!important}}</style>
</main>

<script src="../shared/admin.js"></script>
<script>
let pendingWholesalerApplications = [];

async function onAdminLoggedIn() {
  await loadStats();
  await loadModeration();
}

async function loadStats() {
  const [sup, cat, prod, ord, demand] = await Promise.all([
    sb.from('suppliers').select('id', {count:'exact',head:true}).eq('status','active'),
    sb.from('catalog_categories').select('id', {count:'exact',head:true}),
    sb.from('supplier_products').select('id', {count:'exact',head:true}),
    sb.from('customer_orders').select('id', {count:'exact',head:true}).in('status',['new','confirmed','processing','ready_for_pickup','shipped']),
    sb.from('replenishment_demands').select('id', {count:'exact',head:true}).in('status',['open','partially_covered']).gt('uncovered_qty',0)
  ]);
  document.getElementById('stat-suppliers').textContent = sup.count ?? 0;
  document.getElementById('stat-categories').textContent = cat.count ?? 0;
  document.getElementById('stat-products').textContent = prod.count ?? 0;
  document.getElementById('stat-orders').textContent = `${ord.count ?? 0} / demand ${demand.count ?? 0}`;
}

async function loadModeration() {
  const [supplierRes, wholesalerRes] = await Promise.all([
    sb.from('suppliers').select('*').eq('status','pending').order('created_at'),
    sb.from('role_approvals')
      .select('id,user_id,requested_role,status,requested_at,reviewed_by,reviewed_at,rejection_reason')
      .eq('requested_role', 'wholesaler')
      .eq('status', 'pending')
      .order('requested_at'),
  ]);

  const pendingSuppliers = supplierRes.data || [];
  const wholesalerApplications = wholesalerRes.data || [];
  const wholesalerUserIds = [...new Set(wholesalerApplications.map((item) => item.user_id).filter(Boolean))];
  const [profilesRes, wholesalerRowsRes] = wholesalerUserIds.length
    ? await Promise.all([
      sb.from('profiles').select('id,email,full_name,phone').in('id', wholesalerUserIds),
      sb.from('wholesalers').select('id,user_id,display_name,approval_status').in('user_id', wholesalerUserIds),
    ])
    : [{ data: [], error: null }, { data: [], error: null }];

  const profilesById = new Map((profilesRes.data || []).map((profile) => [profile.id, profile]));
  const wholesalerByUserId = new Map((wholesalerRowsRes.data || []).map((row) => [row.user_id, row]));

  pendingWholesalerApplications = wholesalerApplications.map((application) => {
    const profile = profilesById.get(application.user_id) || {};
    const wholesaler = wholesalerByUserId.get(application.user_id) || {};
    const fallbackName = (profile.email || '').split('@')[0] || 'Оптовик';
    return {
      ...application,
      profile,
      wholesaler,
      display_name: wholesaler.display_name || profile.full_name || fallbackName,
    };
  });

  const panel = document.getElementById('mod-panel');
  const badge = document.getElementById('mod-badge');
  const totalPending = pendingSuppliers.length + pendingWholesalerApplications.length;

  if (totalPending) {
    badge.style.display = 'inline-block';
    badge.textContent = '⏳ ' + totalPending + ' заявок';
    panel.style.display = '';
    const modList = document.getElementById('mod-list');
    const supplierHtml = pendingSuppliers.length ? `
      <div style="margin-bottom:18px">
        <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">Поставщики</div>
        ${pendingSuppliers.map(s => `
          <div style="background:var(--surface2);border:1px solid var(--border2);border-radius:12px;padding:14px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:10px">
            <div style="width:48px;height:48px;border-radius:10px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden">
              ${sanitizeImageUrl(s.logo||'') ? `<span data-safe-image="${sanitizeImageUrl(s.logo||'')}" data-alt="${esc(s.name||'logo')}"></span>` : '🏭'}
            </div>
            <div style="flex:1;min-width:150px">
              <div style="font-weight:700">${esc(s.name)}</div>
              <div style="font-size:12px;color:var(--muted)">${esc(s.phone||'')} ${s.whatsapp ? '· WA: '+esc(s.whatsapp) : ''}</div>
              <div style="font-size:11px;color:var(--muted)">${esc(s.address||'')} · ${new Date(s.created_at).toLocaleDateString('ru-RU')}</div>
            </div>
            <div style="display:flex;gap:8px">
              <button class="btn btn-success btn-sm" onclick="moderateSupplier('${s.id}','active')">✓ Одобрить</button>
              <button class="btn btn-danger btn-sm" onclick="moderateSupplier('${s.id}','rejected')">✕ Отклонить</button>
            </div>
          </div>`).join('')}
      </div>` : '';

    const wholesalerHtml = pendingWholesalerApplications.length ? `
      <div>
        <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">Оптовики</div>
        ${pendingWholesalerApplications.map((app) => `
          <div style="background:var(--surface2);border:1px solid var(--border2);border-radius:12px;padding:14px;display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap;margin-bottom:10px">
            <div style="width:48px;height:48px;border-radius:10px;background:rgba(79,110,247,0.12);border:1px solid rgba(79,110,247,0.25);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">🏬</div>
            <div style="flex:1;min-width:180px">
              <div style="font-weight:700">${esc(app.display_name)}</div>
              <div style="font-size:12px;color:var(--muted)">${esc(app.profile.email || '—')}</div>
              <div style="font-size:12px;color:var(--muted)">${esc(app.profile.full_name || 'Без имени')} ${app.profile.phone ? '· ' + esc(app.profile.phone) : ''}</div>
              <div style="font-size:11px;color:var(--muted)">Заявка от ${new Date(app.requested_at).toLocaleString('ru-RU')}</div>
            </div>
            <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
              <button class="btn btn-success btn-sm" onclick="approveWholesalerApplication('${app.id}')">Approve</button>
              <button class="btn btn-danger btn-sm" onclick="rejectWholesalerApplication('${app.id}')">Reject</button>
            </div>
          </div>`).join('')}
      </div>` : '';

    modList.innerHTML = supplierHtml + wholesalerHtml;
    modList.querySelectorAll('[data-safe-image]').forEach(host=>{
      const img=document.createElement('img');
      img.src=host.dataset.safeImage;
      if(host.dataset.alt) img.alt=host.dataset.alt;
      img.style.width='100%';
      img.style.height='100%';
      img.style.objectFit='cover';
      host.textContent='';
      host.appendChild(img);
    });
  } else {
    badge.style.display = 'none';
    panel.style.display = 'none';
  }
}

async function moderateSupplier(id, status) {
  if (!confirm(status==='active' ? 'Одобрить поставщика?' : 'Отклонить поставщика?')) return;
  const { error } = await sb.from('suppliers').update({status}).eq('id',id);
  if (error) return showToast(error.message, false);
  showToast(status==='active' ? '✓ Одобрен' : '✕ Отклонён');
  await loadModeration();
  await loadStats();
}

function getWholesalerApplication(id) {
  return pendingWholesalerApplications.find((item) => item.id === id) || null;
}

async function approveWholesalerApplication(applicationId) {
  const application = getWholesalerApplication(applicationId);
  if (!application) return showToast('Заявка не найдена', false);
  const proposedName = application.display_name || 'Оптовик';
  const displayName = prompt('Display name для оптовика', proposedName);
  if (displayName === null) return;

  const { error } = await sb.rpc('review_role_application', {
    p_application_id: applicationId,
    p_decision: 'approved',
    p_display_name: displayName.trim() || proposedName,
    p_rejection_reason: null,
  });

  if (error) return showToast(error.message, false);
  showToast('✓ Заявка оптовика одобрена');
  await loadModeration();
  await loadStats();
}

async function rejectWholesalerApplication(applicationId) {
  const application = getWholesalerApplication(applicationId);
  if (!application) return showToast('Заявка не найдена', false);
  const reason = prompt('Причина отклонения', application.rejection_reason || '');
  if (reason === null) return;

  const { error } = await sb.rpc('review_role_application', {
    p_application_id: applicationId,
    p_decision: 'rejected',
    p_display_name: null,
    p_rejection_reason: reason.trim() || null,
  });

  if (error) return showToast(error.message, false);
  showToast('✕ Заявка оптовика отклонена');
  await loadModeration();
  await loadStats();
}

sb.channel('rt-moderation')
  .on('postgres_changes',
    {event:'INSERT',schema:'public',table:'suppliers',filter:'status=eq.pending'},
    () => { loadModeration(); showToast('🔔 Новая заявка от поставщика'); }
  )
  .on('postgres_changes',
    {event:'INSERT',schema:'public',table:'role_approvals',filter:'requested_role=eq.wholesaler'},
    () => { loadModeration(); showToast('🔔 Новая заявка от оптовика'); }
  )
  .on('postgres_changes',
    {event:'*',schema:'public',table:'wholesalers'},
    () => { loadModeration(); }
  )
  .on('postgres_changes',
    {event:'*',schema:'public',table:'role_approvals'},
    () => { loadModeration(); }
  )
  .subscribe();


// Auto-run auth check
(async () => {
  const user = await adminAuthGuard();
  if (user) {
    document.getElementById('main-header').style.display = '';
    document.getElementById('main-content').style.display = '';
    if (typeof onAdminLoggedIn === 'function') await onAdminLoggedIn();
  }
})();

</script>
</body>
</html>
