<!DOCTYPE html><html lang='ru'><head>
<meta charset='utf-8'><meta name='viewport' content='width=device-width, initial-scale=1'>
<title>Admin — Supplier procurement visibility</title>
<script src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js'></script>
<script src='../shared/runtime-config.js'></script><script src='../shared/supabase-client.js'></script>
<script src='../shared/domain/constants.js'></script><script src='../shared/domain/access-control.js'></script>
<script src='../shared/domain/procurement.js'></script><script src='../shared/admin.js'></script>
<style>body{font-family:Arial;background:#0f1117;color:#fff;margin:0;padding:18px}.panel{background:#181c27;border:1px solid #2a3045;border-radius:10px;padding:12px;margin-bottom:12px}.row{border-top:1px solid #2a3045;padding:8px 0}</style>
</head><body>
<div id='auth-loading'>Loading...</div>
<header id='main-header' style='display:none'><a href='adm-dashboard.html' style='color:#9bb2ff'>← Dashboard</a></header>
<main id='main-content' style='display:none'>
<h1>Admin procurement visibility</h1>
<div class='panel'><div id='orders'>Загрузка...</div></div>
<div class='panel'><h3>Receiving summary</h3><div id='receiving'>Загрузка...</div></div>
</main>
<script>
(async()=>{const u=await adminAuthGuard(); if(!u)return; await Promise.all([loadOrders(), loadReceiving()]);})();
function esc(v){const d=document.createElement('div');d.textContent=String(v??'');return d.innerHTML;}
function money(v){return Number(v||0).toLocaleString('ru-RU',{minimumFractionDigits:2,maximumFractionDigits:2})+' ₸';}
function statusLabel(s){return PM_PROCUREMENT.STATUS_LABELS[s]||s;}

async function loadOrders(){
  const res = await sb.from('supplier_orders').select(`id,status,order_total,created_at,supplier_user_id,wholesaler_id,supplier_order_items(id,requested_units,confirmed_units,received_units_total,damaged_units_total,accepted_units_total,title_snapshot)`).order('created_at',{ascending:false}).limit(200);
  if(res.error){document.getElementById('orders').textContent=res.error.message;return;}
  const rows=(res.data||[]).map(PM_PROCUREMENT.normalizeOrder);
  document.getElementById('orders').innerHTML = rows.map(o=>`<div class='row'><b>${esc(o.id.slice(0,8))}</b> · ${statusLabel(o.status)} · ${money(o.order_total)}<br><small>supplier=${esc(o.supplier_user_id)} | wholesaler=${esc(o.wholesaler_id)} | items=${o.supplier_order_items.length}</small></div>`).join('') || 'Нет supplier_orders';
}

async function loadReceiving(){
  const res = await sb.from('supplier_order_receivings').select(`id,supplier_order_id,created_at,note,supplier_order_receiving_items(received_units,damaged_units,accepted_units)`).order('created_at',{ascending:false}).limit(200);
  if(res.error){document.getElementById('receiving').textContent=res.error.message;return;}
  document.getElementById('receiving').innerHTML = (res.data||[]).map(r=>{
    const t=(r.supplier_order_receiving_items||[]).reduce((a,i)=>({received:a.received+Number(i.received_units||0),damaged:a.damaged+Number(i.damaged_units||0),accepted:a.accepted+Number(i.accepted_units||0)}),{received:0,damaged:0,accepted:0});
    return `<div class='row'><b>${esc(r.id.slice(0,8))}</b> order=${esc((r.supplier_order_id||'').slice(0,8))}<br><small>received=${t.received} damaged=${t.damaged} accepted=${t.accepted}</small></div>`;
  }).join('') || 'Нет приемок';
}
</script></body></html>
