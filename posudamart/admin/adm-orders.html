<!DOCTYPE html>
<html lang='ru'>
<head>
<meta charset='utf-8'><meta name='viewport' content='width=device-width, initial-scale=1'>
<title>Admin — Orders & Demand visibility</title>
<script src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js'></script>
<script src='../shared/runtime-config.js'></script><script src='../shared/supabase-client.js'></script>
<script src='../shared/domain/constants.js'></script><script src='../shared/domain/access-control.js'></script>
<script src='../shared/domain/customer-orders.js'></script><script src='../shared/admin.js'></script>
<link rel="stylesheet" href="../shared/admin.css">
<style>.row{border-top:1px solid var(--border);padding:10px 0}.mono{font-family:var(--mono)}</style>
</head>
<body>
<div id='auth-loading'>Loading...</div>
<header class="topbar" id="main-header" style="display:none">
  <div class="brand-group"><a href="adm-dashboard.html" class="brand"><div class="brand-dot"></div>Posudamart</a><span class="admin-badge">👑 Админ</span></div>
  <nav class="nav"><a href="adm-dashboard.html" class="nav-btn">🏠 Главная</a><a href="adm-orders.html" class="nav-btn active">📋 Заказы</a></nav>
  <div class="topbar-right"><span class="user-name" id="admin-email">—</span><button class="btn-logout" onclick="adminSignOut()">Выйти</button></div>
</header>
<main class="container" id='main-content' style='display:none'>
<h1>Admin visibility: customer runtime</h1>
<div class='panel'><h3>Customer orders</h3><div id='customer-orders'>Загрузка...</div></div>
<div class='panel'><h3>Active replenishment demand</h3><div id='demand'>Загрузка...</div></div>
</main>
<script>
(async()=>{const u=await adminAuthGuard(); if(!u)return; await Promise.all([loadCustomerOrders(), loadDemand()]);})();

function esc(v){const d=document.createElement('div');d.textContent=String(v??'');return d.innerHTML;}

async function loadCustomerOrders(){
  const res = await sb.from('customer_orders').select('id,status,total_amount,created_at,customer_user_id,wholesaler_id').order('created_at',{ascending:false}).limit(200);
  if(res.error){document.getElementById('customer-orders').textContent=res.error.message;return;}

  document.getElementById('customer-orders').innerHTML=(res.data||[]).map(o=>`<div class='row'><b class='mono'>${PM_CUSTOMER_ORDERS.formatOrderNumber(o.id)}</b> · ${PM_CUSTOMER_ORDERS.statusLabel(o.status)} · ${Number(o.total_amount||0).toFixed(2)} ₸<br><small>customer=${esc(o.customer_user_id)} | wholesaler=${esc(o.wholesaler_id)} | ${new Date(o.created_at).toLocaleString('ru-RU')}</small></div>`).join('')||'Нет customer orders';
}

async function loadDemand(){
  const res = await sb.from('replenishment_demands').select('id,wholesaler_id,product_id,sold_qty,sales_count,uncovered_qty,pieces_per_box,suggested_boxes,suggested_qty,status,updated_at').in('status',['open','partially_covered']).gt('uncovered_qty',0).order('updated_at',{ascending:false}).limit(200);
  if(res.error){document.getElementById('demand').textContent=res.error.message;return;}

  document.getElementById('demand').innerHTML=(res.data||[]).map(d=>`<div class='row'><b>${esc(d.product_id)}</b> · sold=${Number(d.sold_qty||0)} · sales=${Number(d.sales_count||0)} · uncovered=${Number(d.uncovered_qty||0)}<br><small>to order: ${Number(d.suggested_boxes||0)} boxes / ${Number(d.suggested_qty||0)} units · wholesaler=${esc(d.wholesaler_id)}</small></div>`).join('')||'Нет активного demand';
}
</script>
</body></html>
