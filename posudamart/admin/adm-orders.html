<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin - Orders</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../shared/runtime-config.js"></script>
<script src="../shared/supabase-client.js"></script>
<script src="../shared/domain/constants.js"></script>
<script src="../shared/domain/access-control.js"></script>
<script src="../shared/domain/customer-orders.js"></script>
<script src="../shared/admin.js"></script>
<link rel="stylesheet" href="../shared/admin.css">
<style>.row{border-top:1px solid var(--border);padding:10px 0}.mono{font-family:var(--mono)}</style>
</head>
<body>
<div id="auth-loading"><div class="spinner"></div></div>
<header class="topbar" id="main-header" style="display:none">
  <div class="brand-group"><a href="adm-dashboard.html" class="brand"><div class="brand-dot"></div>Posudamart</a><span class="admin-badge">Админ</span></div>
  <nav class="nav"><a href="adm-dashboard.html" class="nav-btn">Главная</a><a href="adm-orders.html" class="nav-btn active">Заказы</a></nav>
  <div class="topbar-right"><span class="user-name" id="admin-email">-</span><button class="btn-logout" onclick="adminSignOut()">Выйти</button></div>
</header>
<main class="container" id="main-content" style="display:none">
  <h1>Operational visibility</h1>
  <div class="panel"><h3>Customer orders</h3><div id="customer-orders">Загрузка...</div></div>
  <div class="panel"><h3>Replenishment runtime</h3><div id="demand">Загрузка...</div></div>
</main>
<script>
let adminOrders = [];
let adminOrderItems = [];

function normalizeAdminOrder(order) {
  return {
    ...order,
    customer_user_id: order.customer_user_id || order.customer_id || null,
    total_amount: Number(order.total_amount ?? order.total ?? 0),
  };
}

async function loadCustomerOrders() {
  const ordersWrap = document.getElementById('customer-orders');
  const ordersRes = await sb
    .from('customer_orders')
    .select('*')
    .order('created_at', { ascending: false })
    .limit(200);

  if (ordersRes.error) {
    ordersWrap.textContent = 'customer_orders runtime пока недоступен.';
    return;
  }

  adminOrders = (ordersRes.data || []).map(normalizeAdminOrder);
  if (!adminOrders.length) {
    ordersWrap.innerHTML = '<div class="empty"><div class="empty-icon">📋</div>Customer orders пока нет</div>';
    return;
  }

  const orderIds = adminOrders.map((order) => order.id).filter(Boolean);
  if (orderIds.length) {
    const itemsRes = await sb
      .from('customer_order_items')
      .select('*')
      .in('order_id', orderIds);

    if (!itemsRes.error) {
      adminOrderItems = itemsRes.data || [];
    } else {
      adminOrderItems = [];
    }
  }

  ordersWrap.innerHTML = adminOrders.map((order) => {
    const items = adminOrderItems.filter((item) => item.order_id === order.id);
    const itemsPreview = items.length
      ? items.slice(0, 3).map((item) => `${esc(item.title_snapshot || item.product_name || 'Товар')} × ${Number(item.quantity || 0)}`).join('<br>')
      : '<span style="color:var(--muted)">Позиции заказа пока недоступны.</span>';
    return `
      <div class="row">
        <b class="mono">${PM_CUSTOMER_ORDERS.formatOrderNumber(order)}</b>
        · ${PM_CUSTOMER_ORDERS.statusLabel(order.status)}
        · ${Number(order.total_amount || 0).toFixed(2)} ₸
        <br>
        <small>customer=${esc(order.customer_user_id)} | wholesaler=${esc(order.wholesaler_id)} | ${order.created_at ? new Date(order.created_at).toLocaleString('ru-RU') : '—'}</small>
        <div style="margin-top:8px;font-size:13px">${itemsPreview}</div>
      </div>
    `;
  }).join('');
}

async function loadDemand() {
  const demandWrap = document.getElementById('demand');
  const demandRes = await sb
    .from('replenishment_demands')
    .select('*')
    .limit(100);

  if (demandRes.error) {
    demandWrap.innerHTML = '<div style="color:var(--muted)">Replenishment runtime еще не внедрен в этой среде.</div>';
    return;
  }

  const rows = demandRes.data || [];
  if (!rows.length) {
    demandWrap.innerHTML = '<div style="color:var(--muted)">Активного replenishment runtime пока нет.</div>';
    return;
  }

  const hasOperationalFields = rows.some((row) =>
    Object.prototype.hasOwnProperty.call(row, 'status') &&
    Object.prototype.hasOwnProperty.call(row, 'updated_at')
  );

  if (!hasOperationalFields) {
    demandWrap.innerHTML = '<div style="color:var(--muted)">Таблица replenishment_demands существует, но operational runtime еще не готов. Показываем safe placeholder.</div>';
    return;
  }

  demandWrap.innerHTML = rows.map((row) => `
    <div class="row">
      <b>${esc(row.product_id || row.id)}</b>
      <br>
      <small>status=${esc(row.status || '—')} | updated_at=${esc(row.updated_at || row.created_at || '—')}</small>
    </div>
  `).join('');
}

(async () => {
  const admin = await adminAuthGuard();
  if (!admin) return;
  showAdminShell();
  try {
    await Promise.all([loadCustomerOrders(), loadDemand()]);
  } catch (error) {
    document.getElementById('customer-orders').textContent = error?.message || 'Не удалось загрузить заказы.';
    document.getElementById('demand').innerHTML = '<div style="color:var(--muted)">Replenishment runtime временно скрыт.</div>';
  }
})();
</script>
</body>
</html>
