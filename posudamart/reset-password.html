<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Posudamart — Новый пароль</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0a0c12; --surface:#111520; --border2:#2a3558; --text:#e8ecf4; --muted:#6b7a9e; --accent:#4f6ef7; --accent2:#7c3aed; --font:'Montserrat',sans-serif; }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{background:rgba(17,21,32,0.95);border:1px solid var(--border2);border-radius:24px;padding:40px 36px;width:100%;max-width:420px;box-shadow:0 32px 80px rgba(0,0,0,0.5);text-align:center}
    .logo-icon{width:60px;height:60px;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:inline-flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:14px}
    .title{font-size:20px;font-weight:800;margin-bottom:6px}
    .sub{font-size:13px;color:var(--muted);margin-bottom:20px}
    .field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;text-align:left}
    label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px}
    .pw-wrap{position:relative}
    .pw-wrap input{padding-right:44px}
    .eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px}
    input{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:10px;color:var(--text);padding:12px 14px;font-family:var(--font);font-size:15px;outline:none;transition:border-color .15s}
    input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,110,247,0.15)}
    .btn{display:flex;align-items:center;justify-content:center;width:100%;padding:13px;border-radius:12px;border:none;cursor:pointer;font-family:var(--font);font-size:15px;font-weight:700;background:linear-gradient(135deg,var(--accent),#6366f1);color:#fff;margin-top:4px;transition:opacity .2s}
    .btn:disabled{opacity:0.5;cursor:not-allowed}
    .alert{padding:12px 14px;border-radius:10px;font-size:13px;font-weight:600;margin-bottom:14px;display:none;text-align:left}
    .alert.error{background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;display:block}
    .alert.success{background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.3);color:#86efac;display:block}
    .spinner-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;padding:10px 0}
    .spinner{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="card">
  <div class="logo-icon">🏺</div>
  <div class="title">Новый пароль</div>
  <div class="sub" id="sub-text">Подождите, проверяем ссылку...</div>

  <!-- Loading state -->
  <div id="loading-wrap" class="spinner-wrap">
    <div class="spinner"></div>
    <div style="font-size:13px;color:var(--muted)">Проверяем ссылку...</div>
  </div>

  <!-- Form (hidden until session ready) -->
  <div id="form-wrap" style="display:none">
    <div id="alert" class="alert"></div>
    <div class="field">
      <label>Новый пароль</label>
      <div class="pw-wrap">
        <input type="password" id="new-pass" placeholder="Минимум 6 символов">
        <button class="eye" type="button" onclick="toggleEye('new-pass',this)">👁</button>
      </div>
    </div>
    <div class="field">
      <label>Повтори пароль</label>
      <div class="pw-wrap">
        <input type="password" id="new-pass2" placeholder="Повтори пароль">
        <button class="eye" type="button" onclick="toggleEye('new-pass2',this)">👁</button>
      </div>
    </div>
    <button class="btn" id="btn-reset">Сохранить пароль</button>
  </div>

  <!-- Error state -->
  <div id="error-wrap" style="display:none">
    <div style="font-size:40px;margin-bottom:12px">❌</div>
    <div style="font-size:14px;color:var(--muted);margin-bottom:20px">Ссылка недействительна или устарела.<br>Запроси новую ссылку для сброса пароля.</div>
    <button class="btn" onclick="window.location.href='index.html'">← Вернуться на главную</button>
  </div>
</div>

<script>
const sb = supabase.createClient(
  'https://dnpsufzgnudgrqbezioo.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRucHN1ZnpnbnVkZ3JxYmV6aW9vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NjYxNjAsImV4cCI6MjA5MDA0MjE2MH0.N8qP1DfkCmJ9uKMkowtmUYQc-F_ybEyPdfTo86PIGEk'
);

function toggleEye(id, btn) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}

function showAlert(msg, type) {
  const el = document.getElementById('alert');
  el.textContent = msg;
  el.className = 'alert ' + type;
}

function showForm() {
  document.getElementById('loading-wrap').style.display = 'none';
  document.getElementById('form-wrap').style.display = 'block';
  document.getElementById('sub-text').textContent = 'Введи новый пароль для входа';
  document.getElementById('new-pass').focus();
}

function showError() {
  document.getElementById('loading-wrap').style.display = 'none';
  document.getElementById('error-wrap').style.display = 'block';
  document.getElementById('sub-text').textContent = 'Ошибка';
}

// Supabase v2: слушаем событие PASSWORD_RECOVERY
// Оно срабатывает когда пользователь переходит по ссылке из письма
sb.auth.onAuthStateChange((event, session) => {
  if (event === 'PASSWORD_RECOVERY') {
    // Сессия восстановлена из ссылки — показываем форму
    clearTimeout(timeout);
    showForm();
  }
  // НЕ показываем форму при обычном SIGNED_IN — это не сброс пароля
});

// Таймаут — если за 5 секунд не пришло событие, показываем ошибку
const timeout = setTimeout(() => {
  const form = document.getElementById('form-wrap');
  const loading = document.getElementById('loading-wrap');
  if (loading.style.display !== 'none') {
    showError();
  }
}, 5000);

// Кнопка сохранить
document.getElementById('btn-reset').addEventListener('click', async () => {
  const p1 = document.getElementById('new-pass').value;
  const p2 = document.getElementById('new-pass2').value;

  if (p1.length < 6) return showAlert('Пароль должен быть минимум 6 символов', 'error');
  if (p1 !== p2) return showAlert('Пароли не совпадают', 'error');

  const btn = document.getElementById('btn-reset');
  btn.disabled = true;
  btn.textContent = 'Сохраняем...';

  const { error } = await sb.auth.updateUser({ password: p1 });

  if (error) {
    btn.disabled = false;
    btn.textContent = 'Сохранить пароль';
    return showAlert(error.message, 'error');
  }

  // Успех
  showAlert('✅ Пароль успешно изменён! Переходим на главную...', 'success');
  btn.disabled = true;

  // Выходим и редиректим
  await sb.auth.signOut();
  setTimeout(() => window.location.href = 'index.html', 2000);
});
</script>
</body>
</html>
