<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Posudamart — Каталог</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../shared/runtime-config.js"></script>
  <script src="../shared/supabase-client.js"></script>
  <script src="../shared/domain/constants.js"></script>
  <script src="../shared/domain/access-control.js"></script>
  <script src="../shared/domain/catalog.js"></script>
  <script src="../shared/client.js"></script>
  <link rel="stylesheet" href="../shared/client.css">
</head>
<body>
<div id="auth-loading"><div class="spinner"></div></div>
<header class="topbar"><a href="clt-dashboard.html" class="brand">Posudamart</a><nav class="nav"><a class="nav-btn active" href="clt-catalog.html">Каталог</a><a class="nav-btn" href="clt-orders.html">Заказы</a></nav></header>
<main class="container">
  <h1>Каталог оптовика (по категориям)</h1>
  <p style="color:var(--muted)">Клиент видит только ассортимент оптовика из фактически активных складских позиций.</p>
  <div id="categories" class="panel">Загрузка...</div>
  <div id="items" class="panel"></div>
</main>
<script>
let categories=[]; let catalog=[];
(async()=>{
  try{
    const customer=await authGuard();
    if(!customer) return;
    await loadCatalog(customer);
  }catch(err){console.error(err);}
})();

async function loadCatalog(customer){
  const [catRes, invRes] = await Promise.all([
    sb.from('catalog_categories').select('id,name').eq('is_active', true).order('name'),
    sb.from('wholesaler_inventory_items').select(`id,wholesaler_id,available_qty,unit_sale_price,
      catalog_products!inner(id,name,article,category_id,catalog_categories(name),catalog_product_images(image_url,sort_order))`)
      .gt('available_qty',0)
      .order('updated_at',{ascending:false})
  ]);
  if(catRes.error) throw catRes.error;
  if(invRes.error) throw invRes.error;
  categories=catRes.data||[];
  catalog=PM_CATALOG.mapWholesalerRowsToCustomerCatalog((invRes.data||[]).map(r=>({
    ...r,
    category_id:r.catalog_products?.category_id,
    category_name:r.catalog_products?.catalog_categories?.name,
    product_id:r.catalog_products?.id,
    article:r.catalog_products?.article,
    product_name:r.catalog_products?.name,
    image_url:r.catalog_products?.catalog_product_images?.[0]?.image_url
  })));
  renderCategories();
  document.getElementById('auth-loading').style.display='none';
}

function renderCategories(){
  const el=document.getElementById('categories');
  el.innerHTML = categories.map(c=>`<button class="btn btn-ghost" onclick="openCategory('${c.id}')" style="margin:4px">${c.name}</button>`).join('') || 'Категории отсутствуют.';
}
function openCategory(categoryId){
  const items=catalog.filter(x=>x.categoryId===categoryId);
  const el=document.getElementById('items');
  if(!items.length){el.innerHTML='В этой категории пока нет доступного ассортимента.';return;}
  el.innerHTML=items.map(i=>`<div style="padding:8px 0;border-bottom:1px solid var(--border)"><b>${i.name}</b> (${i.article||'—'})<br>${i.unitSalePrice.toFixed(2)} ₸/шт · Остаток: ${i.availableQty} шт</div>`).join('');
}
</script>
</body>
</html>
