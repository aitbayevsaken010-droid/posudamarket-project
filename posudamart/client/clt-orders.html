<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Posudamart — Мои customer-заказы</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../shared/runtime-config.js"></script>
  <script src="../shared/supabase-client.js"></script>
  <script src="../shared/domain/constants.js"></script>
  <script src="../shared/domain/access-control.js"></script>
  <script src="../shared/domain/customer-orders.js"></script>
  <script src="../shared/client.js"></script>
  <link rel="stylesheet" href="../shared/client.css">
</head>
<body>
<div id="auth-loading"><div class="spinner"></div></div>
<div id="toast"></div>

<header class="topbar">
  <div class="brand-group">
    <a href="clt-dashboard.html" class="brand"><div class="brand-dot"></div>Posudamart</a>
    <span class="client-badge">🛒 Клиент</span>
  </div>
  <nav class="nav">
    <a href="clt-dashboard.html" class="nav-btn">🏠 Главная</a>
    <a href="clt-catalog.html" class="nav-btn">🛍 Каталог</a>
    <a href="clt-cart.html" class="nav-btn">🧺 Корзина</a>
    <a href="clt-orders.html" class="nav-btn active">📋 Заказы</a>
  </nav>
  <div class="topbar-right">
    <span class="user-name" id="user-name">—</span>
    <button class="btn-logout" onclick="signOut()">Выйти</button>
  </div>
</header>

<main class="container">
  <div class="page-head">
    <h1>Мои заказы</h1>
    <input id="search" type="text" placeholder="Поиск по номеру/артикулу" style="max-width:280px">
  </div>
  <div class="panel" id="orders-wrap">Загрузка...</div>
</main>

<script>
let orders = [];
let orderItems = [];
let wholesalerMap = new Map();

(async()=>{
  try {
    const profile = await authGuard();
    if (!profile) return;
    await loadOrders();
    document.getElementById('search').addEventListener('input', renderOrders);
    document.getElementById('auth-loading').style.display = 'none';
  } catch (err) {
    console.error(err);
    showFatalLoadError(err?.message || 'Не удалось загрузить customer-заказы.', () => window.location.reload());
  }
})();

async function loadOrders() {
  const [ordersRes, itemsRes, wholesalerRes] = await Promise.all([
    sb.from('customer_orders').select('id, wholesaler_id, customer_user_id, status, total_amount, placed_at, created_at, updated_at, cancellation_reason').eq('customer_user_id', currentUser.id).order('created_at', { ascending: false }),
    sb.from('customer_order_items').select(`id, order_id, product_id, quantity, unit_price, catalog_products(name, article)`).order('created_at', { ascending: false }),
    sb.from('wholesalers').select('id, display_name, legal_name, user_id'),
  ]);

  if (ordersRes.error) throw ordersRes.error;
  if (itemsRes.error) throw itemsRes.error;
  if (wholesalerRes.error) throw wholesalerRes.error;

  orders = ordersRes.data || [];
  const orderIds = new Set(orders.map((o) => o.id));
  orderItems = (itemsRes.data || []).filter((item) => orderIds.has(item.order_id));
  wholesalerMap = new Map((wholesalerRes.data || []).map((w) => [w.id, w]));
  renderOrders();
}

function renderOrders() {
  const term = (document.getElementById('search').value || '').trim().toLowerCase();
  const wrap = document.getElementById('orders-wrap');

  const filtered = orders.filter((order) => {
    const number = PM_CUSTOMER_ORDERS.formatOrderNumber(order.id).toLowerCase();
    const items = orderItems.filter((item) => item.order_id === order.id);
    const itemHit = items.some((item) => `${item.catalog_products?.name || ''} ${item.catalog_products?.article || ''}`.toLowerCase().includes(term));
    return !term || number.includes(term) || itemHit;
  });

  if (!filtered.length) {
    wrap.innerHTML = '<div class="empty"><div class="empty-icon">📋</div>Заказов пока нет</div>';
    return;
  }

  wrap.innerHTML = filtered.map((order) => {
    const items = orderItems.filter((item) => item.order_id === order.id);
    const canCancel = ['new', 'confirmed'].includes(order.status);
    const wholesaler = wholesalerMap.get(order.wholesaler_id);
    const wholesalerName = wholesaler?.display_name || wholesaler?.legal_name || 'Оптовик';
    return `
      <div style="border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:center">
          <div>
            <div style="font-weight:800">${PM_CUSTOMER_ORDERS.formatOrderNumber(order.id)}</div>
            <div style="color:var(--muted);font-size:12px">${esc(wholesalerName)} · ${new Date(order.created_at).toLocaleString('ru-RU')}</div>
          </div>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            ${PM_CUSTOMER_ORDERS.statusBadge(order.status)}
            <span style="font-weight:800">${Number(order.total_amount || 0).toFixed(2)} ₸</span>
          </div>
        </div>
        <div style="margin-top:10px">
          ${items.map((item) => `<div style="display:flex;justify-content:space-between;gap:10px;border-top:1px solid var(--border);padding-top:6px;margin-top:6px"><span>${esc(item.catalog_products?.name || '—')} (${esc(item.catalog_products?.article || '—')})</span><span>${Number(item.quantity || 0)} шт × ${Number(item.unit_price || 0).toFixed(2)} ₸</span></div>`).join('')}
        </div>
        ${order.cancellation_reason ? `<div style="margin-top:8px;color:var(--danger)">Причина отмены: ${esc(order.cancellation_reason)}</div>` : ''}
        ${canCancel ? `<div style="margin-top:10px"><button class="btn btn-danger btn-sm" onclick="cancelOrder('${order.id}')">Отменить заказ</button></div>` : ''}
      </div>
    `;
  }).join('');
}

async function cancelOrder(orderId) {
  if (!confirm('Отменить заказ и освободить резерв?')) return;
  const res = await sb.rpc('pm_set_customer_order_status', {
    p_order_id: orderId,
    p_status: 'cancelled',
    p_note: 'Cancelled by customer',
  });
  if (res.error) {
    showToast(res.error.message || 'Отмена не выполнена', false);
    return;
  }
  showToast('Заказ отменён, резерв возвращён на склад');
  await loadOrders();
}
</script>
</body>
</html>
