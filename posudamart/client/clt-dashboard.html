<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Posudamart — Клиент</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../shared/runtime-config.js"></script>
  <script src="../shared/supabase-client.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/client.css">
</head>
<body>
<div id="auth-loading"><div class="spinner"></div></div>
<div id="toast"></div>

<header class="topbar">
  <div class="brand-group">
    <a href="clt-dashboard.html" class="brand"><div class="brand-dot"></div>Posudamart</a>
    <span class="client-badge">🛒 Клиент</span>
  </div>
  <nav class="nav">
    <a href="clt-dashboard.html" class="nav-btn active">🏠 Главная</a>
    <a href="clt-catalog.html" class="nav-btn">🛍 Каталог</a>
    <a href="clt-orders.html" class="nav-btn" id="nav-orders">📋 Заказы</a>
    <a href="clt-profile.html" class="nav-btn">👤 Профиль</a>
  </nav>
  <div class="topbar-right">
    <span class="user-name" id="user-name">—</span>
    <button class="btn-logout" onclick="signOut()">Выйти</button>
  </div>
</header>

<main class="container">
  <div class="page-head">
    <h1 id="welcome-title">Добро пожаловать!</h1>
  </div>

  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px">
    <div class="panel">
      <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Активных заказов</div>
      <div style="font-size:28px;font-weight:800;color:var(--accent)" id="stat-active">—</div>
    </div>
    <div class="panel">
      <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Ожидают ответа</div>
      <div style="font-size:28px;font-weight:800;color:var(--warning)" id="stat-changed">—</div>
    </div>
    <div class="panel">
      <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Подтверждено</div>
      <div style="font-size:28px;font-weight:800;color:var(--success)" id="stat-confirmed">—</div>
    </div>
  </div>

  <div class="panel" style="margin-bottom:16px">
    <div class="panel-title">Последние заказы</div>
    <div id="recent-orders"><div class="empty"><div class="empty-icon">📋</div>Заказов пока нет</div></div>
  </div>

  <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px">
    <a href="clt-catalog.html" class="panel" style="text-decoration:none;color:var(--text);cursor:pointer;transition:border-color .15s;display:flex;align-items:center;gap:16px" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">
      <div style="font-size:32px">🛍</div>
      <div><div style="font-weight:700;font-size:15px">Каталог товаров</div><div style="font-size:12px;color:var(--muted);margin-top:3px">Все товары поставщиков</div></div>
    </a>
    <a href="clt-orders.html" class="panel" style="text-decoration:none;color:var(--text);cursor:pointer;transition:border-color .15s;display:flex;align-items:center;gap:16px" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">
      <div style="font-size:32px">📋</div>
      <div><div style="font-weight:700;font-size:15px">Мои заказы</div><div style="font-size:12px;color:var(--muted);margin-top:3px">История и статусы</div></div>
    </a>
  </div>
</main>

<nav class="mob-nav">
  <div class="mob-nav-inner">
    <a href="clt-dashboard.html" class="mob-btn active"><span class="ico">🏠</span>Главная</a>
    <a href="clt-catalog.html" class="mob-btn"><span class="ico">🛍</span>Каталог</a>
    <a href="clt-orders.html" class="mob-btn"><span class="ico">📋</span>Заказы</a>
    <a href="clt-profile.html" class="mob-btn"><span class="ico">👤</span>Профиль</a>
  </div>
</nav>

<script src="../shared/client.js"></script>
<script>
(async()=>{
  try {
    const profile = await authGuard();
    if(!profile) return;
    document.getElementById('welcome-title').textContent = 'Привет, ' + (profile.full_name || profile.email) + '!';

    const ordersRes = await sb.from('client_orders')
      .select('*').eq('client_id', profile.id)
      .order('created_at',{ascending:false});
    const all = getSupabaseDataOrThrow(ordersRes, 'Список заказов клиента');
  const active    = all.filter(o=>o.status!=='Отменён'&&o.status!=='Подтверждён');
  const changed   = all.filter(o=>o.status==='Изменён');
  const confirmed = all.filter(o=>o.status==='Подтверждён');

  document.getElementById('stat-active').textContent    = active.length;
  document.getElementById('stat-changed').textContent   = changed.length;
  document.getElementById('stat-confirmed').textContent = confirmed.length;

  // Show notification dot on nav if there are changed orders
  if(changed.length>0){
    document.getElementById('nav-orders').innerHTML =
      '📋 Заказы <span class="notif-dot"></span>';
  }

  const recent = all.slice(0,5);
  if(recent.length){
    document.getElementById('recent-orders').innerHTML=`
      <div class="table-wrap"><table>
        <thead><tr><th>Номер</th><th>Дата</th><th>Статус</th><th>Сумма</th></tr></thead>
        <tbody>${recent.map(o=>{
          const sum=(o.items||[]).reduce((s,i)=>s+Number(i.totalPrice||0),0);
          return`<tr style="cursor:pointer" onclick="location.href='clt-orders.html'">
            <td class="mono"><strong>#${esc(o.number)}</strong></td>
            <td style="color:var(--muted)">${esc(o.created_at?.slice(0,10)||'')}</td>
            <td>${statusBadge(o.status)}</td>
            <td class="mono">${fmtMoney(sum)}</td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>`;
  }
  } catch (err) {
    console.error('clt-dashboard init failed', err);
    showFatalLoadError(err?.message || 'Не удалось загрузить страницу.', () => window.location.reload());
  }
})();
</script>
</body>
</html>
