<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Posudamart — Клиент</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../shared/runtime-config.js"></script>
  <script src="../shared/supabase-client.js"></script>
  <script src="../shared/domain/constants.js"></script>
  <script src="../shared/domain/access-control.js"></script>
  <script src="../shared/domain/customer-orders.js"></script>
  <script src="../shared/client.js"></script>
  <link rel="stylesheet" href="../shared/client.css">
</head>
<body>
<div id="auth-loading"><div class="spinner"></div></div>
<div id="toast"></div>
<header class="topbar">
  <div class="brand-group">
    <a href="clt-dashboard.html" class="brand"><div class="brand-dot"></div>Posudamart</a>
    <span class="client-badge">🛒 Клиент</span>
  </div>
  <nav class="nav">
    <a href="clt-dashboard.html" class="nav-btn active">🏠 Главная</a>
    <a href="clt-catalog.html" class="nav-btn">🛍 Каталог</a>
    <a href="clt-cart.html" class="nav-btn">🧺 Корзина</a>
    <a href="clt-orders.html" class="nav-btn">📋 Заказы</a>
    <a href="clt-profile.html" class="nav-btn">👤 Профиль</a>
  </nav>
  <div class="topbar-right">
    <span class="user-name" id="user-name">—</span>
    <button class="btn-logout" onclick="signOut()">Выйти</button>
  </div>
</header>
<main class="container">
  <div class="page-head"><h1 id="welcome-title">Добро пожаловать!</h1></div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px">
    <div class="panel"><div style="font-size:11px;color:var(--muted)">Активные заказы</div><div id="stat-active" style="font-size:30px;font-weight:800">0</div></div>
    <div class="panel"><div style="font-size:11px;color:var(--muted)">Завершённые</div><div id="stat-completed" style="font-size:30px;font-weight:800">0</div></div>
    <div class="panel"><div style="font-size:11px;color:var(--muted)">В корзине, шт</div><div id="stat-cart" style="font-size:30px;font-weight:800">0</div></div>
  </div>
  <div class="panel" id="recent-orders"></div>
</main>
<script>
(async()=>{
  try {
    const profile = await authGuard();
    if (!profile) return;
    document.getElementById('welcome-title').textContent = `Привет, ${profile.full_name || currentUser?.email || 'клиент'}!`;

    const [orders, cartRes] = await Promise.all([
      PM_CUSTOMER_ORDERS.loadCustomerOrders(sb, currentUser.id),
      PM_CUSTOMER_ORDERS.getOpenCart(sb, currentUser.id),
    ]);
    const active = orders.filter((o) => PM_CUSTOMER_ORDERS.ACTIVE_STATUSES.includes(o.status)).length;
    const completed = orders.filter((o) => o.status === 'completed').length;
    const cartUnits = (cartRes?.customer_cart_items || []).reduce((sum, i) => sum + Number(i.quantity || 0), 0);

    document.getElementById('stat-active').textContent = active;
    document.getElementById('stat-completed').textContent = completed;
    document.getElementById('stat-cart').textContent = cartUnits;

    const recent = orders.slice(0, 5);
    document.getElementById('recent-orders').innerHTML = recent.length
      ? `<div class="panel-title">Последние customer-заказы</div><div class="table-wrap"><table><thead><tr><th>Номер</th><th>Дата</th><th>Статус</th><th>Сумма</th></tr></thead><tbody>${recent.map((o)=>`<tr><td>${PM_CUSTOMER_ORDERS.formatOrderNumber(o)}</td><td>${new Date(o.created_at).toLocaleDateString('ru-RU')}</td><td>${PM_CUSTOMER_ORDERS.statusBadge(o.status)}</td><td>${Number(o.total_amount || 0).toFixed(2)} ₸</td></tr>`).join('')}</tbody></table></div>`
      : '<div class="empty"><div class="empty-icon">📋</div>Заказов пока нет</div>';

    document.getElementById('auth-loading').style.display = 'none';
  } catch (err) {
    console.error(err);
    showFatalLoadError(err?.message || 'Не удалось загрузить dashboard клиента.', () => window.location.reload());
  }
})();
</script>
</body>
</html>
