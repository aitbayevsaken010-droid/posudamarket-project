<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wholesaler — Customer orders</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../shared/runtime-config.js"></script>
  <script src="../shared/supabase-client.js"></script>
  <script src="../shared/domain/constants.js"></script>
  <script src="../shared/domain/access-control.js"></script>
  <script src="../shared/domain/customer-orders.js"></script>
  <script src="../shared/wholesaler.js"></script>
  <link rel="stylesheet" href="../shared/client.css">
</head>
<body>
<div id="auth-loading"><div class="spinner"></div></div>
<div id="toast"></div>
<header class="topbar">
  <a href="wh-dashboard.html" class="brand"><div class="brand-dot"></div>Posudamart Wholesaler</a>
  <nav class="nav">
    <a href="wh-dashboard.html" class="nav-btn">🏠 Главная</a>
    <a href="wh-catalog.html" class="nav-btn">🧾 Procurement</a>
    <a href="wh-orders.html" class="nav-btn active">🛒 Customer orders</a>
    <a href="wh-demand.html" class="nav-btn">📈 Demand</a>
  </nav>
  <div class="topbar-right"><span id="user-name" class="user-name">—</span><button class="btn-logout" onclick="wholesalerSignOut()">Выйти</button></div>
</header>
<main class="container">
  <div class="page-head"><h1>Customer orders</h1><input id="search" placeholder="Номер / товар" style="max-width:260px"></div>
  <div class="panel" id="orders">Загрузка...</div>
</main>
<script>
let orders=[];
let items=[];
let customerMap=new Map();
let pendingOrders=new Set();
let orderErrors=new Map();

function toast(msg, ok=true){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.background=ok?'var(--accent)':'var(--danger)';
  t.style.opacity='1';
  clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity='0',2500);
}

(async()=>{
  try {
    const wholesaler = await wholesalerAuthGuard();
    if (!wholesaler) return;
    await loadOrders(wholesaler.id);
    document.getElementById('search').addEventListener('input', render);
    document.getElementById('auth-loading').style.display='none';
  } catch (err) {
    console.error(err);
    alert(err?.message || 'Failed to load wholesaler orders runtime');
  }
})();

async function loadOrders(wholesalerId){
  const [ordersData, customerRes] = await Promise.all([
    PM_CUSTOMER_ORDERS.loadWholesalerOrders(sb, wholesalerId),
    sb.from('profiles').select('id,full_name')
  ]);
  if (customerRes.error) throw customerRes.error;

  orders=ordersData||[];
  const ids=new Set(orders.map(o=>o.id));
  items=await PM_CUSTOMER_ORDERS.loadOrderItems(sb, [...ids]);
  customerMap=new Map((customerRes.data||[]).map(p=>[p.id,p]));
  render();
}

function availableActions(status){
  const actions=[];
  if(status==='new'||status==='confirmed') actions.push('cancel');
  if(status==='ready_for_pickup'||status==='shipped') actions.push('complete');
  return actions;
}

function render(){
  const term=(document.getElementById('search').value||'').toLowerCase().trim();
  const filtered=orders.filter(o=>{
    const n=PM_CUSTOMER_ORDERS.formatOrderNumber(o).toLowerCase();
    const hitItems=items.filter(i=>i.order_id===o.id).some(i=>`${i.title||''} ${i.article||''}`.toLowerCase().includes(term));
    return !term||n.includes(term)||hitItems;
  });
  const container=document.getElementById('orders');
  if(!filtered.length){container.innerHTML='<div class="empty">Нет customer-заказов</div>';return;}

  container.innerHTML=filtered.map(o=>{
    const orderItems=items.filter(i=>i.order_id===o.id);
    const customer=customerMap.get(o.customer_user_id);
    const actions=availableActions(o.status);
    const isPending=pendingOrders.has(o.id);
    const errorText=orderErrors.get(o.id)||'';
    const buttons=actions.map(action=>{
      if(action==='cancel'){
        return `<button class='btn btn-danger btn-sm' onclick="cancelOrder('${o.id}')" ${isPending?'disabled':''}>${isPending?'Выполняется...':'Отменить'}</button>`;
      }
      return `<button class='btn btn-sm' onclick="completeOrder('${o.id}')" ${isPending?'disabled':''}>${isPending?'Выполняется...':'Завершить'}</button>`;
    }).join(' ');
    return `<div style='border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px'>
      <div style='display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap'>
        <div><b>${PM_CUSTOMER_ORDERS.formatOrderNumber(o)}</b><div style='color:var(--muted);font-size:12px'>Клиент: ${customer?.full_name||o.customer_user_id}</div></div>
        <div style='display:flex;gap:10px;align-items:center'>${PM_CUSTOMER_ORDERS.statusBadge(o.status)}<b>${Number(o.total_amount||0).toFixed(2)} ₸</b></div>
      </div>
      <div style='margin-top:8px'>${orderItems.map(i=>`<div style='font-size:13px'>• ${i.title||'—'} (${i.article||'—'}) — ${Number(i.quantity||0)} шт</div>`).join('')}</div>
      ${o.cancellation_reason?`<div style='color:var(--danger);margin-top:6px'>Причина: ${o.cancellation_reason}</div>`:''}
      ${errorText?`<div style='color:var(--danger);margin-top:6px'>${errorText}</div>`:''}
      <div style='display:flex;gap:6px;flex-wrap:wrap;margin-top:10px'>${buttons||'<span style="color:var(--muted)">Финальный статус</span>'}</div>
    </div>`;
  }).join('');
}

async function cancelOrder(orderId){
  if(pendingOrders.has(orderId)) return;
  if(!confirm('Отменить заказ?')) return;
  pendingOrders.add(orderId);
  orderErrors.delete(orderId);
  render();
  try{
    await PM_CUSTOMER_ORDERS.cancelOrder(sb, orderId);
    toast('Заказ отменён');
    await loadOrders(currentWholesalerProfile.id);
  }catch(err){
    orderErrors.set(orderId, err?.message || 'Отмена не выполнена');
    toast(err?.message || 'Отмена не выполнена', false);
  }finally{
    pendingOrders.delete(orderId);
    render();
  }
}

async function completeOrder(orderId){
  if(pendingOrders.has(orderId)) return;
  if(!confirm('Завершить заказ?')) return;
  pendingOrders.add(orderId);
  orderErrors.delete(orderId);
  render();
  try{
    await PM_CUSTOMER_ORDERS.completeOrder(sb, orderId);
    toast('Заказ завершён');
    await loadOrders(currentWholesalerProfile.id);
  }catch(err){
    orderErrors.set(orderId, err?.message || 'Завершение не выполнено');
    toast(err?.message || 'Завершение не выполнено', false);
  }finally{
    pendingOrders.delete(orderId);
    render();
  }
}
</script>
</body>
</html>
