<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wholesaler — Customer orders</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../shared/runtime-config.js"></script>
  <script src="../shared/supabase-client.js"></script>
  <script src="../shared/domain/constants.js"></script>
  <script src="../shared/domain/access-control.js"></script>
  <script src="../shared/domain/customer-orders.js"></script>
  <script src="../shared/wholesaler.js"></script>
  <link rel="stylesheet" href="../shared/client.css">
</head>
<body>
<div id="auth-loading"><div class="spinner"></div></div>
<div id="toast"></div>
<header class="topbar">
  <a href="wh-dashboard.html" class="brand"><div class="brand-dot"></div>Posudamart Wholesaler</a>
  <nav class="nav">
    <a href="wh-dashboard.html" class="nav-btn">🏠 Главная</a>
    <a href="wh-catalog.html" class="nav-btn">🧾 Procurement</a>
    <a href="wh-orders.html" class="nav-btn active">🛒 Customer orders</a>
    <a href="wh-demand.html" class="nav-btn">📈 Demand</a>
  </nav>
  <div class="topbar-right"><span id="user-name" class="user-name">—</span><button class="btn-logout" onclick="wholesalerSignOut()">Выйти</button></div>
</header>
<main class="container">
  <div class="page-head"><h1>Customer orders</h1><input id="search" placeholder="Номер / товар" style="max-width:260px"></div>
  <div class="panel" id="orders">Загрузка...</div>
</main>
<script>
let orders=[];
let items=[];
let customerMap=new Map();

function toast(msg, ok=true){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.background=ok?'var(--accent)':'var(--danger)';
  t.style.opacity='1';
  clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity='0',2500);
}

(async()=>{
  try {
    const wholesaler = await wholesalerAuthGuard();
    if (!wholesaler) return;
    await loadOrders(wholesaler.id);
    document.getElementById('search').addEventListener('input', render);
    document.getElementById('auth-loading').style.display='none';
  } catch (err) {
    console.error(err);
    alert(err?.message || 'Failed to load wholesaler orders runtime');
  }
})();

async function loadOrders(wholesalerId){
  const [ordersRes, itemsRes, customerRes] = await Promise.all([
    sb.from('customer_orders').select('id,customer_user_id,status,total_amount,created_at,updated_at,cancellation_reason').eq('wholesaler_id', wholesalerId).order('created_at',{ascending:false}),
    sb.from('customer_order_items').select('id,order_id,quantity,unit_price,catalog_products(name,article)').order('created_at',{ascending:false}),
    sb.from('profiles').select('id,full_name')
  ]);
  if (ordersRes.error) throw ordersRes.error;
  if (itemsRes.error) throw itemsRes.error;
  if (customerRes.error) throw customerRes.error;

  orders=ordersRes.data||[];
  const ids=new Set(orders.map(o=>o.id));
  items=(itemsRes.data||[]).filter(i=>ids.has(i.order_id));
  customerMap=new Map((customerRes.data||[]).map(p=>[p.id,p]));
  render();
}

function transitions(status){
  if(status==='new') return ['confirmed','processing','cancelled'];
  if(status==='confirmed') return ['processing','ready_for_pickup','shipped','cancelled'];
  if(status==='processing') return ['ready_for_pickup','shipped','cancelled'];
  if(status==='ready_for_pickup'||status==='shipped') return ['completed','cancelled'];
  return [];
}

function render(){
  const term=(document.getElementById('search').value||'').toLowerCase().trim();
  const filtered=orders.filter(o=>{
    const n=PM_CUSTOMER_ORDERS.formatOrderNumber(o.id).toLowerCase();
    const hitItems=items.filter(i=>i.order_id===o.id).some(i=>`${i.catalog_products?.name||''} ${i.catalog_products?.article||''}`.toLowerCase().includes(term));
    return !term||n.includes(term)||hitItems;
  });
  const container=document.getElementById('orders');
  if(!filtered.length){container.innerHTML='<div class="empty">Нет customer-заказов</div>';return;}

  container.innerHTML=filtered.map(o=>{
    const orderItems=items.filter(i=>i.order_id===o.id);
    const customer=customerMap.get(o.customer_user_id);
    const buttons=transitions(o.status).map(s=>`<button class='btn btn-sm' onclick="changeStatus('${o.id}','${s}')">${PM_CUSTOMER_ORDERS.statusLabel(s)}</button>`).join(' ');
    return `<div style='border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px'>
      <div style='display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap'>
        <div><b>${PM_CUSTOMER_ORDERS.formatOrderNumber(o.id)}</b><div style='color:var(--muted);font-size:12px'>Клиент: ${customer?.full_name||o.customer_user_id}</div></div>
        <div style='display:flex;gap:10px;align-items:center'>${PM_CUSTOMER_ORDERS.statusBadge(o.status)}<b>${Number(o.total_amount||0).toFixed(2)} ₸</b></div>
      </div>
      <div style='margin-top:8px'>${orderItems.map(i=>`<div style='font-size:13px'>• ${i.catalog_products?.name||'—'} (${i.catalog_products?.article||'—'}) — ${Number(i.quantity||0)} шт</div>`).join('')}</div>
      ${o.cancellation_reason?`<div style='color:var(--danger);margin-top:6px'>Причина: ${o.cancellation_reason}</div>`:''}
      <div style='display:flex;gap:6px;flex-wrap:wrap;margin-top:10px'>${buttons||'<span style="color:var(--muted)">Финальный статус</span>'}</div>
    </div>`;
  }).join('');
}

async function changeStatus(orderId, status){
  const note = status==='cancelled' ? prompt('Причина отмены заказа', 'Cancelled by wholesaler') : `Set to ${status}`;
  if(status==='cancelled' && !note) return;

  const res = await sb.rpc('pm_set_customer_order_status', {
    p_order_id: orderId,
    p_status: status,
    p_note: note || null,
  });
  if(res.error){toast(res.error.message||'Status update failed', false);return;}
  toast('Статус обновлён');
  await loadOrders(currentWholesalerProfile.id);
}
</script>
</body>
</html>
