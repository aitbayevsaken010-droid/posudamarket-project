<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Posudamart — Мои товары</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../shared/runtime-config.js"></script>
  <script src="../shared/supabase-client.js"></script>
  <script src="../shared/domain/constants.js"></script>
  <script src="../shared/domain/access-control.js"></script>
  <script src="../shared/domain/catalog.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/supplier.css">
</head>
<body>
<div id="auth-loading"><div class="spinner"></div></div>
<div id="toast"></div>

<header class="topbar">
  <div class="brand-group">
    <a href="sup-dashboard.html" class="brand"><div class="brand-dot"></div>Posudamart</a>
    <span class="supplier-badge">Поставщик</span>
  </div>
  <nav class="nav">
    <a href="sup-dashboard.html" class="nav-btn">🏠 Главная</a>
    <a href="sup-products.html" class="nav-btn active">📦 Товары</a>
    <a href="sup-orders.html" class="nav-btn">📋 Заказы</a>
    <a href="sup-profile.html" class="nav-btn">👤 Профиль</a>
  </nav>
  <div class="topbar-right">
    <span class="user-name" id="user-name">—</span>
    <button class="btn-logout" onclick="signOut()">Выйти</button>
  </div>
</header>

<main class="container">
  <div class="page-head">
    <h1>Мои товары</h1>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <input id="search-products" type="text" placeholder="Поиск: название или артикул" style="width:260px">
      <select id="filter-category" style="width:220px">
        <option value="">Все категории</option>
      </select>
      <span style="color:var(--muted);font-size:13px;display:flex;align-items:center" id="products-count">0 товаров</span>
    </div>
  </div>

  <div class="split">
    <!-- Форма -->
    <div class="panel" id="form-panel">
      <div class="panel-title">Карточка товара</div>
      <input type="hidden" id="pf-id">
      <div class="form-grid cols1">
        <div class="field">
          <label>Наименование *</label>
          <input type="text" id="pf-name" maxlength="200" placeholder="Название товара">
        </div>
        <div class="field">
          <label>Категория *</label>
          <select id="pf-category">
            <option value="">— выбери категорию —</option>
          </select>
        </div>
        <div class="field">
          <label>Артикул</label>
          <input type="text" id="pf-sku" maxlength="60" placeholder="SKU-001">
        </div>
        <div class="field">
          <label>Штук в коробке *</label>
          <input type="number" id="pf-units" min="1" step="1" value="1">
        </div>
        <div class="field">
          <label>Цена за штуку (₸) *</label>
          <input type="number" id="pf-unit-price" min="0" step="0.01" placeholder="0.00">
        </div>
        <div class="field">
          <label>Цена за коробку (₸)</label>
          <input type="number" id="pf-box-price" readonly style="color:var(--muted)">
        </div>
        <div class="field full">
          <label>Примечание</label>
          <textarea id="pf-note" maxlength="500" placeholder="Дополнительная информация..."></textarea>
        </div>
        <div class="field full">
          <label>Фото товара</label>
          <div class="photo-wrap">
            <div class="photo-ph" id="pf-ph" onclick="document.getElementById('pf-photo').click()">+</div>
            <img class="photo-preview-img" id="pf-preview" alt="" onclick="document.getElementById('pf-photo').click()" style="cursor:pointer">
          </div>
          <button class="btn btn-sm btn-danger" id="pf-remove" style="margin-top:8px">✕ Убрать фото</button>
          <input type="file" id="pf-photo" accept="image/*" style="display:none">
          <div style="font-size:11px;color:var(--muted);margin-top:4px">Макс. 900×900px, JPEG</div>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" id="pf-submit">Сохранить</button>
        <button class="btn btn-ghost" id="pf-cancel">Очистить</button>
      </div>
    </div>

    <!-- Список -->
    <div class="panel">
      <div class="panel-title">Список товаров (<span id="count">0</span>)</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:50px">Фото</th>
              <th>Наименование</th>
              <th>Артикул</th>
              <th>Цена/кор.</th>
              <th>Шт/кор.</th>
              <th style="width:80px">Действия</th>
            </tr>
          </thead>
          <tbody id="products-tbody">
            <tr><td colspan="6" class="empty"><div class="empty-icon">📦</div>Загрузка...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<nav class="mob-nav">
  <div class="mob-nav-inner">
    <a href="sup-dashboard.html" class="mob-btn"><span class="ico">🏠</span>Главная</a>
    <a href="sup-products.html" class="mob-btn active"><span class="ico">📦</span>Товары</a>
    <a href="sup-orders.html" class="mob-btn"><span class="ico">📋</span>Заказы</a>
    <a href="sup-profile.html" class="mob-btn"><span class="ico">👤</span>Профиль</a>
  </div>
</nav>

<style>
  .split{display:grid;grid-template-columns:360px 1fr;gap:16px;align-items:start}
  @media(max-width:900px){.split{grid-template-columns:1fr}}
</style>

<script src="../shared/supplier.js"></script>
<script>
let offerings = [], categories = [], pfPhotoData = '', canonicalProducts = [];

(async () => {
  try {
    const supplier = await authGuard();
    if (!supplier) return;
    await PM_CATALOG.assertSupplierAccess(sb);
    await Promise.all([loadCategories(), loadOfferings()]);
  } catch (err) {
    console.error('sup-products init failed', err);
    showFatalLoadError(err?.message || 'Не удалось загрузить страницу товаров.', () => window.location.reload());
  }
})();

async function loadCategories() {
  categories = await PM_CATALOG.loadCategories(sb);
  const sel = document.getElementById('pf-category');
  const listSel = document.getElementById('filter-category');
  sel.innerHTML = '<option value="">— выбери категорию —</option>';
  listSel.innerHTML = '<option value="">Все категории</option>';
  categories.forEach(c => {
    sel.innerHTML += `<option value="${c.id}">${esc(c.name)}</option>`;
    listSel.innerHTML += `<option value="${c.id}">${esc(c.name)}</option>`;
  });
}

async function loadOfferings() {
  const { data, error } = await sb
    .from('supplier_products')
    .select(`id, product_id, supplier_article, units_per_box, price_per_box, derived_unit_price, is_active,
      catalog_products!inner(id,name,article,category_id,description,is_active,catalog_product_images(image_url,sort_order),catalog_product_variants(variant_name,is_active))`)
    .eq('supplier_user_id', currentUser.id)
    .order('created_at', { ascending: false });
  if (error) throw new Error(error.message);

  offerings = (data || []).map((row) => ({
    id: row.id,
    product_id: row.product_id,
    name: row.catalog_products?.name || '—',
    article: row.supplier_article || row.catalog_products?.article || '',
    category_id: row.catalog_products?.category_id || null,
    description: row.catalog_products?.description || '',
    units_per_box: Number(row.units_per_box || 0),
    price_per_box: Number(row.price_per_box || 0),
    derived_unit_price: Number(row.derived_unit_price || 0),
    is_active: Boolean(row.is_active && row.catalog_products?.is_active),
    photo: row.catalog_products?.catalog_product_images?.[0]?.image_url || '',
    variants: (row.catalog_products?.catalog_product_variants || []).filter(v => v.is_active !== false).map(v => v.variant_name),
  }));
  canonicalProducts = offerings.map(o => ({ id: o.product_id, article: o.article }));
  render();
}

function render() {
  const term = (document.getElementById('search-products').value || '').toLowerCase().trim();
  const filterCat = document.getElementById('filter-category').value;
  const filtered = offerings.filter(p => {
    const matchesTerm = !term || (p.name || '').toLowerCase().includes(term) || (p.article || '').toLowerCase().includes(term);
    const matchesCat = !filterCat || p.category_id === filterCat;
    return matchesTerm && matchesCat;
  });
  const tbody = document.getElementById('products-tbody');
  document.getElementById('count').textContent = filtered.length;
  document.getElementById('products-count').textContent = `${filtered.length} из ${offerings.length} товаров`;
  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty"><div class="empty-icon">📦</div>Товаров пока нет — добавь первый!</td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map(p => {
    const cat = categories.find(c => c.id === p.category_id)?.name || '—';
    const safePhoto = sanitizeImageUrl(p.photo||'');
    const photo = safePhoto ? `<span data-safe-image="${safePhoto}" data-alt="${esc(p.name||'photo')}"></span>` : `<div class="thumb-ph">📦</div>`;
    return `<tr>
      <td>${photo}</td>
      <td><strong>${esc(p.name)}</strong><br><span style="font-size:11px;color:var(--muted)">${esc(cat)} · ${p.is_active ? 'Активен' : 'Неактивен'}</span></td>
      <td class="mono">${esc(p.article||'—')}</td>
      <td class="mono">${fmtMoney(p.price_per_box)}</td>
      <td>${fmtNum(p.units_per_box)}</td>
      <td><div class="row-actions">
        <button class="btn btn-sm btn-ghost" onclick="editProduct('${p.id}')">✏</button>
      </div></td>
    </tr>`;
  }).join('');

  tbody.querySelectorAll('[data-safe-image]').forEach(host=>{
    const img=document.createElement('img');
    img.className='thumb';
    img.src=host.dataset.safeImage;
    if(host.dataset.alt) img.alt=host.dataset.alt;
    host.textContent='';
    host.appendChild(img);
  });
}

document.getElementById('pf-photo').addEventListener('change', async e => {
  const file = e.target.files?.[0]; if (!file) return;
  try { pfPhotoData = await resizeImage(file); setPhotoPreview(pfPhotoData); }
  catch { showToast('Не удалось загрузить фото', false); }
});

document.getElementById('pf-remove').addEventListener('click', () => {
  pfPhotoData = ''; document.getElementById('pf-photo').value = ''; setPhotoPreview('');
});

function setPhotoPreview(url) {
  const prev = document.getElementById('pf-preview'), ph = document.getElementById('pf-ph');
  if (url) { prev.src = url; prev.style.display = 'block'; ph.style.display = 'none'; }
  else { prev.removeAttribute('src'); prev.style.display = 'none'; ph.style.display = 'flex'; }
}

['search-products','filter-category'].forEach(id => document.getElementById(id).addEventListener('input', render));

function resetForm() {
  document.getElementById('pf-id').value = '';
  ['pf-name','pf-sku','pf-unit-price','pf-box-price','pf-note'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('pf-units').value = 1;
  document.getElementById('pf-category').value = '';
  pfPhotoData = ''; document.getElementById('pf-photo').value = ''; setPhotoPreview('');
  document.getElementById('pf-submit').textContent = 'Сохранить';
}
document.getElementById('pf-cancel').addEventListener('click', resetForm);

function editProduct(id) {
  const p = offerings.find(x => x.id === id); if (!p) return;
  document.getElementById('pf-id').value = p.id;
  document.getElementById('pf-name').value = p.name || '';
  document.getElementById('pf-category').value = p.category_id || '';
  document.getElementById('pf-sku').value = p.article || '';
  document.getElementById('pf-units').value = p.units_per_box || 1;
  document.getElementById('pf-unit-price').value = p.derived_unit_price || '';
  document.getElementById('pf-box-price').value = p.price_per_box || '';
  document.getElementById('pf-note').value = p.description || '';
  pfPhotoData = p.photo || ''; setPhotoPreview(pfPhotoData);
  document.getElementById('pf-submit').textContent = 'Обновить';
  document.getElementById('form-panel').scrollIntoView({ behavior: 'smooth' });
}

document.getElementById('pf-submit').addEventListener('click', async () => {
  try {
    const editId = document.getElementById('pf-id').value;
    const units = parseInt(document.getElementById('pf-units').value, 10);
    const unitPrice = parseFloat(document.getElementById('pf-unit-price').value || '0');
    const payload = {
      name: document.getElementById('pf-name').value,
      article: document.getElementById('pf-sku').value,
      categoryId: document.getElementById('pf-category').value,
      description: document.getElementById('pf-note').value,
      unitsPerBox: units,
      pricePerBox: unitPrice * units,
      imageUrl: pfPhotoData,
      variants: [],
      isActive: true,
      productId: offerings.find(x => x.id === editId)?.product_id || null,
    };

    const btn = document.getElementById('pf-submit');
    btn.disabled = true; btn.textContent = 'Сохраняем...';
    await PM_CATALOG.upsertSupplierProduct(sb, currentUser.id, payload, editId || null);
    btn.disabled = false;
    resetForm();
    await loadOfferings();
    showToast(editId ? '✓ Товар обновлён' : '✓ Товар добавлен');
  } catch (error) {
    document.getElementById('pf-submit').disabled = false;
    document.getElementById('pf-submit').textContent = document.getElementById('pf-id').value ? 'Обновить' : 'Сохранить';
    showToast(error.message || 'Ошибка сохранения', false);
  }
});

['pf-unit-price','pf-units'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    const u = parseFloat(document.getElementById('pf-unit-price').value)||0;
    const n = parseInt(document.getElementById('pf-units').value)||0;
    document.getElementById('pf-box-price').value = n > 0 ? (u*n).toFixed(2) : '';
  });
});
</script>

</body>
</html>
