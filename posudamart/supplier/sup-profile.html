<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Posudamart — Профиль</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../shared/runtime-config.js"></script>
  <script src="../shared/supabase-client.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/supplier.css">
</head>
<body>
<div id="auth-loading"><div class="spinner"></div></div>
<div id="toast"></div>

<header class="topbar">
  <div class="brand-group">
    <a href="sup-dashboard.html" class="brand"><div class="brand-dot"></div>Posudamart</a>
    <span class="supplier-badge">Поставщик</span>
  </div>
  <nav class="nav">
    <a href="sup-dashboard.html" class="nav-btn">🏠 Главная</a>
    <a href="sup-products.html" class="nav-btn">📦 Товары</a>
    <a href="sup-orders.html" class="nav-btn">📋 Заказы</a>
    <a href="sup-profile.html" class="nav-btn active">👤 Профиль</a>
  </nav>
  <div class="topbar-right">
    <span class="user-name" id="user-name">—</span>
    <button class="btn-logout" onclick="signOut()">Выйти</button>
  </div>
</header>

<main class="container">
  <div class="page-head"><h1>Профиль компании</h1></div>

  <div style="max-width:560px;display:flex;flex-direction:column;gap:16px">

    <!-- Данные компании -->
    <div class="panel">
      <div class="panel-title">Данные компании</div>
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px">
        <div id="logo-wrap" style="width:80px;height:80px;border-radius:16px;background:var(--surface2);border:1px dashed var(--border2);display:flex;align-items:center;justify-content:center;font-size:32px;cursor:pointer;overflow:hidden;flex-shrink:0" onclick="document.getElementById('logo-input').click()">
          <span id="logo-emoji">🏭</span>
          <img id="logo-img" src="" alt="" style="display:none;width:100%;height:100%;object-fit:cover;border-radius:16px">
        </div>
        <div>
          <div style="font-size:13px;font-weight:600;margin-bottom:6px">Логотип компании</div>
          <button class="btn btn-sm" onclick="document.getElementById('logo-input').click()">📷 Изменить</button>
          <input type="file" id="logo-input" accept="image/*" style="display:none">
        </div>
      </div>
      <div class="form-grid cols1">
        <div class="field"><label>Название компании *</label><input type="text" id="prof-name"></div>
        <div class="field"><label>WhatsApp</label><input type="tel" id="prof-whatsapp"></div>
        <div class="field"><label>Телефон</label><input type="tel" id="prof-phone"></div>
        <div class="field"><label>Адрес</label><input type="text" id="prof-address"></div>
        <div class="field"><label>Комментарий</label><textarea id="prof-comment"></textarea></div>
        <div class="field"><label>Email (не меняется)</label><input type="email" id="prof-email" readonly></div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" id="btn-save-profile">Сохранить профиль</button>
      </div>
      <div class="divider"></div>
      <div style="font-size:13px;color:var(--muted)">Статус: <span class="badge badge-active" id="status-badge">Активен</span></div>
    </div>

    <!-- Смена пароля -->
    <div class="panel">
      <div class="panel-title">Сменить пароль</div>
      <div class="form-grid cols1">
        <div class="field">
          <label>Новый пароль</label>
          <div style="position:relative">
            <input type="password" id="new-pass" placeholder="Минимум 6 символов" autocomplete="new-password" style="padding-right:44px;width:100%">
            <button type="button" onclick="toggleEye('new-pass',this)" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px">👁</button>
          </div>
        </div>
        <div class="field">
          <label>Повтори пароль</label>
          <div style="position:relative">
            <input type="password" id="new-pass2" placeholder="Повтори пароль" autocomplete="new-password" style="padding-right:44px;width:100%">
            <button type="button" onclick="toggleEye('new-pass2',this)" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px">👁</button>
          </div>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" id="btn-change-pass">🔒 Сменить пароль</button>
      </div>
    </div>

    <!-- Тема оформления -->
    <div class="panel">
      <div class="panel-title">🎨 Тема оформления</div>
      <div id="theme-grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px"></div>
      <div style="font-size:12px;color:var(--muted);margin-top:12px">Тема применяется сразу и сохраняется в браузере.</div>
    </div>

  </div>
</main>

<nav class="mob-nav">
  <div class="mob-nav-inner">
    <a href="sup-dashboard.html" class="mob-btn"><span class="ico">🏠</span>Главная</a>
    <a href="sup-products.html" class="mob-btn"><span class="ico">📦</span>Товары</a>
    <a href="sup-orders.html" class="mob-btn"><span class="ico">📋</span>Заказы</a>
    <a href="sup-profile.html" class="mob-btn active"><span class="ico">👤</span>Профиль</a>
  </div>
</nav>

<script src="../shared/supplier.js"></script>
<script>
let logoData = '';
let logoFile = null;

function toggleEye(id, btn) {
  const i = document.getElementById(id);
  i.type = i.type === 'password' ? 'text' : 'password';
  btn.textContent = i.type === 'password' ? '👁' : '🙈';
}

(async () => {
  const supplier = await authGuard();
  if (!supplier) return;

  // Fill form
  document.getElementById('prof-name').value = supplier.name || '';
  document.getElementById('prof-whatsapp').value = supplier.whatsapp || '';
  document.getElementById('prof-phone').value = supplier.phone || '';
  document.getElementById('prof-address').value = supplier.address || '';
  document.getElementById('prof-comment').value = supplier.comment || '';
  document.getElementById('prof-email').value = currentUser.email || '';
  logoData = supplier.logo || '';
  if (logoData) {
    document.getElementById('logo-img').src = logoData;
    document.getElementById('logo-img').style.display = 'block';
    document.getElementById('logo-emoji').style.display = 'none';
  }
  if (supplier.status === 'rejected') {
    document.getElementById('status-badge').textContent = 'Отклонён';
    document.getElementById('status-badge').className = 'badge badge-danger';
  }
  // Render theme picker
  renderThemePicker('theme-grid');
})();

document.getElementById('logo-input').addEventListener('change', async e => {
  const file = e.target.files?.[0]; if (!file) return;
  try {
    logoFile = file;
    logoData = await resizeImage(file);
    document.getElementById('logo-img').src = logoData;
    document.getElementById('logo-img').style.display = 'block';
    document.getElementById('logo-emoji').style.display = 'none';
  } catch { showToast('Не удалось загрузить логотип', false); }
});

document.getElementById('btn-save-profile').addEventListener('click', async () => {
  const name = document.getElementById('prof-name').value.trim();
  if (!name) return showToast('Введи название компании', false);
  const btn = document.getElementById('btn-save-profile');
  btn.disabled = true; btn.textContent = 'Сохраняем...';

  // Загружаем логотип в Storage если выбран новый файл
  let finalLogoUrl = logoData;
  if (logoFile) {
    const ext = logoFile.name.split('.').pop();
    const path = `${currentSupplier.id}/logo.${ext}`;
    const { data: up, error: upErr } = await sb.storage.from('supplier-logos').upload(path, logoFile, { upsert: true });
    if (!upErr && up) {
      const { data: urlData } = sb.storage.from('supplier-logos').getPublicUrl(path);
      finalLogoUrl = urlData.publicUrl;
    }
    // если ошибка загрузки — используем base64 как fallback
  }

  const { error } = await sb.from('suppliers').update({
    name, logo: finalLogoUrl,
    whatsapp: document.getElementById('prof-whatsapp').value.trim(),
    phone: document.getElementById('prof-phone').value.trim(),
    address: document.getElementById('prof-address').value.trim(),
    comment: document.getElementById('prof-comment').value.trim(),
    updated_at: new Date().toISOString()
  }).eq('id', currentSupplier.id);
  btn.disabled = false; btn.textContent = 'Сохранить профиль';
  if (error) return showToast(error.message, false);
  logoFile = null; // сбросить после успешного сохранения
  document.getElementById('user-name').textContent = name;
  showToast('✓ Профиль обновлён');
});

document.getElementById('btn-change-pass').addEventListener('click', async () => {
  const p1 = document.getElementById('new-pass').value;
  const p2 = document.getElementById('new-pass2').value;
  if (!p1) return showToast('Введи новый пароль', false);
  if (p1.length < 6) return showToast('Пароль минимум 6 символов', false);
  if (p1 !== p2) return showToast('Пароли не совпадают', false);
  const btn = document.getElementById('btn-change-pass');
  btn.disabled = true; btn.textContent = 'Сохраняем...';
  const { error } = await sb.auth.updateUser({ password: p1 });
  btn.disabled = false; btn.textContent = '🔒 Сменить пароль';
  if (error) return showToast(error.message, false);
  document.getElementById('new-pass').value = '';
  document.getElementById('new-pass2').value = '';
  showToast('✓ Пароль изменён');
});
</script>
</body>
</html>
