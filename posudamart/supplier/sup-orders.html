<!DOCTYPE html><html lang='ru'><head>
<meta charset='utf-8'><meta name='viewport' content='width=device-width, initial-scale=1'>
<title>Supplier — Procurement Orders</title>
<script src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js'></script>
<script src='../shared/runtime-config.js'></script><script src='../shared/supabase-client.js'></script>
<script src='../shared/domain/constants.js'></script><script src='../shared/domain/access-control.js'></script>
<script src='../shared/domain/procurement.js'></script><script src='../shared/supplier.js'></script>
<style>body{font-family:Arial;background:#0f1117;color:#fff;margin:0;padding:18px}.panel{background:#181c27;border:1px solid #2a3045;border-radius:10px;padding:12px;margin-bottom:12px}.row{border-top:1px solid #2a3045;padding:8px 0}.btn{background:#4f6ef7;color:#fff;border:none;border-radius:8px;padding:8px 10px;cursor:pointer}.btn.alt{background:#2a3045}</style>
</head><body>
<h1>Supplier incoming procurement orders</h1><p><a href='sup-dashboard.html' style='color:#9bb2ff'>← Dashboard</a></p>
<div class='panel'><div id='orders'>Загрузка...</div></div>
<div class='panel'><h3>Order details</h3><div id='details'>Выберите заказ</div></div>
<script>
let supplier=null, orders=[], active=null;
(async()=>{supplier=await authGuard(); if(!supplier)return; await loadOrders();})();
function esc(v){const d=document.createElement('div');d.textContent=String(v??'');return d.innerHTML;}
function money(v){return Number(v||0).toLocaleString('ru-RU',{minimumFractionDigits:2,maximumFractionDigits:2})+' ₸';}

async function loadOrders(){
  orders = await PM_PROCUREMENT.loadSupplierOrders(sb, currentUser.id);
  renderOrders();
}
function statusLabel(s){return PM_PROCUREMENT.STATUS_LABELS[s]||s;}
function renderOrders(){
  document.getElementById('orders').innerHTML = orders.map(o=>`<div class='row'><b>${esc(o.id.slice(0,8))}</b> · ${statusLabel(o.status)} · ${money(o.totals.amount)}<br><button class='btn alt' onclick="openOrder('${o.id}')">Open</button></div>`).join('') || 'Нет заказов';
}
function openOrder(id){active=orders.find(x=>x.id===id); renderDetails();}

function renderDetails(){
  if(!active){document.getElementById('details').innerHTML='Выберите заказ'; return;}
  const adjustable=['new','changed_by_supplier'].includes(active.status);
  const logistics=['confirmed','processing','shipped','in_transit'].includes(active.status);
  document.getElementById('details').innerHTML = `<div><b>Order ${esc(active.id)}</b> · ${statusLabel(active.status)}</div>`+
    active.supplier_order_items.map(it=>`<div class='row'>${esc(it.title_snapshot||it.article_snapshot)}<br>requested ${it.requested_boxes} boxes / ${it.requested_units} units<br>confirmed boxes: <input id='cb-${it.id}' type='number' min='0' max='${it.requested_boxes}' value='${it.confirmed_boxes}' ${adjustable?'':'disabled'}></div>`).join('')+
    `<textarea id='sup-note' placeholder='Comment'></textarea><input id='ship-url' placeholder='Shipment proof url' style='width:100%'>
    <div style='margin-top:8px'>
      <button class='btn' ${adjustable?'':'disabled'} onclick='saveAdjust()'>Сохранить подтверждение/уменьшение</button>
      <button class='btn alt' ${logistics?'':'disabled'} onclick="setStatus('processing')">processing</button>
      <button class='btn alt' ${logistics?'':'disabled'} onclick="setStatus('shipped')">shipped</button>
      <button class='btn alt' ${logistics?'':'disabled'} onclick="setStatus('in_transit')">in_transit</button>
    </div>`;
}

async function saveAdjust(){
  if(!active) return;
  const payload = active.supplier_order_items.map(it=>({supplier_order_item_id:it.id,confirmed_boxes:Number(document.getElementById(`cb-${it.id}`).value||0)}));
  const note=document.getElementById('sup-note').value||null;
  const res = await sb.rpc('pm_supplier_adjust_order',{p_order_id:active.id,p_items:payload,p_note:note});
  if(res.error) return alert(res.error.message);
  await loadOrders(); active=orders.find(x=>x.id===active.id)||null; renderDetails();
}

async function setStatus(status){
  const note=document.getElementById('sup-note').value||null;
  const attachment={file_url:document.getElementById('ship-url').value||null};
  const res = await sb.rpc('pm_supplier_set_logistics_status',{p_order_id:active.id,p_status:status,p_note:note,p_shipment_attachment:attachment});
  if(res.error) return alert(res.error.message);
  await loadOrders(); active=orders.find(x=>x.id===active.id)||null; renderDetails();
}
</script></body></html>
