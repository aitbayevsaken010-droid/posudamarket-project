<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Posudamart — Заказы</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../shared/runtime-config.js"></script>
  <script src="../shared/supabase-client.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/supplier.css">
  <style>
    .clickable-order-row{cursor:pointer;transition:background .12s}
    .clickable-order-row:hover{background:rgba(79,110,247,0.06)}
    .order-cell-address{max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  </style>
</head>
<body>
<div id="auth-loading"><div class="spinner"></div></div>
<div id="toast"></div>

<header class="topbar">
  <div class="brand-group">
    <a href="sup-dashboard.html" class="brand"><div class="brand-dot"></div>Posudamart</a>
    <span class="supplier-badge">Поставщик</span>
  </div>
  <nav class="nav">
    <a href="sup-dashboard.html" class="nav-btn">🏠 Главная</a>
    <a href="sup-products.html" class="nav-btn">📦 Товары</a>
    <a href="sup-orders.html" class="nav-btn active">📋 Заказы</a>
    <a href="sup-profile.html" class="nav-btn">👤 Профиль</a>
  </nav>
  <div class="topbar-right">
    <span class="user-name" id="user-name">—</span>
    <button class="btn-logout" onclick="signOut()">Выйти</button>
  </div>
</header>

<main class="container">
  <div class="page-head">
    <h1>Заказы</h1>
  </div>

  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
    <input id="order-search" type="text" placeholder="Поиск: № заказа, клиент, артикул..." style="width:280px">
    <select id="order-status-filter" style="width:200px">
      <option value="">Все статусы</option>
      <option value="Новый">Новый</option>
      <option value="Изменён">Изменён</option>
      <option value="Подтверждён">Подтверждён</option>
      <option value="Отменён">Отменён</option>
      <option value="Оформлен">Оформлен</option>
      <option value="Черновик">Черновик</option>
      <option value="Закрыт">Закрыт</option>
    </select>
  </div>

  <div class="panel">
    <div class="panel-title">Общий список заказов</div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Номер</th><th>Дата</th><th>Статус</th><th>Клиент</th><th>Адрес</th><th>Позиций</th><th>Сумма</th>
        </tr></thead>
        <tbody id="orders-tbody">
          <tr><td colspan="7" class="empty"><div class="empty-icon">📋</div>Загрузка...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<!-- Client order modal -->
<div class="modal-backdrop" id="clt-order-modal" style="position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:500;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)">
  <div style="background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:24px;width:100%;max-width:620px;max-height:90vh;overflow-y:auto">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div>
        <div style="font-size:16px;font-weight:800" id="clt-modal-title">Заказ</div>
        <div id="clt-modal-status" style="margin-top:4px"></div>
      </div>
      <button onclick="closeCltModal()" style="background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:20px;line-height:1;padding:4px">✕</button>
    </div>
    <div id="clt-modal-client-info" style="background:var(--surface2);border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px;display:flex;gap:20px;flex-wrap:wrap"></div>
    <div id="clt-modal-items"></div>
    <div id="clt-modal-client-comment-wrap" style="display:none;margin-top:12px;padding:12px 14px;background:rgba(79,110,247,.08);border:1px solid rgba(79,110,247,.2);border-radius:10px">
      <div style="font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Комментарий клиента</div>
      <div id="clt-modal-client-comment" style="font-size:13px"></div>
    </div>
    <div id="clt-modal-reply-wrap" style="margin-top:14px">
      <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Комментарий поставщика</div>
      <textarea id="clt-sup-comment" placeholder="Пояснение к изменениям..." style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:9px 12px;outline:none;min-height:60px;resize:vertical;font-family:inherit;font-size:13px;transition:border-color .15s"></textarea>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:16px;padding-top:16px;border-top:1px solid var(--border);flex-wrap:wrap;gap:10px">
      <div style="font-size:15px;font-weight:800">Итого: <span id="clt-modal-total" style="color:var(--accent)"></span></div>
      <div id="clt-modal-actions" style="display:flex;gap:8px;flex-wrap:wrap"></div>
    </div>
  </div>
</div>

<nav class="mob-nav">
  <div class="mob-nav-inner">
    <a href="sup-dashboard.html" class="mob-btn"><span class="ico">🏠</span>Главная</a>
    <a href="sup-products.html" class="mob-btn"><span class="ico">📦</span>Товары</a>
    <a href="sup-orders.html" class="mob-btn active"><span class="ico">📋</span>Заказы</a>
    <a href="sup-profile.html" class="mob-btn"><span class="ico">👤</span>Профиль</a>
  </div>
</nav>

<script src="../shared/supplier.js"></script>
<script>
let orders = [], clientOrders = [];
let pendingOpenOrder = new URLSearchParams(window.location.search).get('open_order');
let pendingOpenSource = new URLSearchParams(window.location.search).get('source');
function mountSafeImages(root){
  root.querySelectorAll('[data-safe-image]').forEach(host=>{
    const safe=sanitizeImageUrl(host.dataset.safeImage||'');
    if(!safe) return;
    const img=document.createElement('img');
    img.src=safe;
    const size=Math.max(24, Number(host.dataset.size||36));
    img.style.width=`${size}px`;
    img.style.height=`${size}px`;
    img.style.maxWidth='100%';
    img.style.borderRadius=host.dataset.radius||'6px';
    img.style.objectFit='cover';
    img.style.border='1px solid var(--border)';
    img.style.flexShrink='0';
    img.style.display='block';
    img.onerror=()=>{ host.innerHTML='<span style="font-size:15px">📦</span>'; };
    if(host.dataset.alt) img.alt=host.dataset.alt;
    host.textContent='';
    host.appendChild(img);
  });
}

(async () => {
  try {
    const supplier = await authGuard();
    if (!supplier) return;
    await loadOrders();
    await loadClientOrders();

  sb.channel('rt-orders').on('postgres_changes',
    { event: '*', schema: 'public', table: 'orders', filter: `supplier_id=eq.${supplier.id}` },
    async () => { await loadOrders(); showToast('📋 Заказы обновлены'); }
  ).subscribe();

  sb.channel('rt-client-orders').on('postgres_changes',
    { event: '*', schema: 'public', table: 'client_orders', filter: `supplier_id=eq.${supplier.id}` },
    async () => { await loadClientOrders(); showToast('🛒 Новый заказ от клиента!'); }
  ).subscribe();
  } catch (err) {
    console.error('sup-orders init failed', err);
    showFatalLoadError(err?.message || 'Не удалось загрузить заказы.', () => window.location.reload());
  }
})();

// ── Admin orders (from Posudamart) ──
async function loadOrders() {
  const res = await sb.from('orders').select('*')
    .eq('supplier_id', currentSupplier.id).order('date', { ascending: false });
  orders = getSupabaseDataOrThrow(res, 'Заказы Posudamart');
  renderUnifiedOrders();
}

function renderUnifiedOrders() {
  const term = (document.getElementById('order-search').value || '').toLowerCase().trim();
  const statusFilter = document.getElementById('order-status-filter').value;
  const combined = [
    ...orders.map(o => ({ ...o, source: 'admin', clientName: 'Posudamart', deliveryAddress: o.delivery_address || '—', supplierName: currentSupplier.name })),
    ...clientOrders.map(o => ({ ...o, source: 'client', clientName: (o.client_name || o.client_id?.slice(0,8) || 'Клиент'), deliveryAddress: o.delivery_address || '—', supplierName: currentSupplier.name })),
  ].filter(o => {
    const inItems = (o.items || []).some(i => (i.productName || '').toLowerCase().includes(term) || (i.sku || '').toLowerCase().includes(term));
    const matchesTerm = !term || (String(o.number || '').toLowerCase().includes(term)) || (o.clientName || '').toLowerCase().includes(term) || inItems;
    return matchesTerm && (!statusFilter || o.status === statusFilter);
  }).sort((a, b) => new Date(b.created_at || b.date || 0) - new Date(a.created_at || a.date || 0));

  const tbody = document.getElementById('orders-tbody');
  if (!combined.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty"><div class="empty-icon">📋</div>Заказы не найдены</td></tr>';
    return;
  }
  tbody.innerHTML = combined.map(o => {
    const items = o.items || [];
    const total = items.reduce((s, i) => s + Number(i.totalPrice||0), 0);
    return `<tr class="clickable-order-row" data-order-id="${esc(o.id)}" data-order-source="${o.source}">
      <td class="mono"><strong>#${esc(o.number)}</strong></td>
      <td>${esc((o.created_at || o.date || '').slice(0,10))}</td>
      <td>${o.source==='client' ? cltStatusBadge(o.status) : statusBadge(o.status)}</td>
      <td>${esc(o.clientName || '—')}</td>
      <td class="order-cell-address">${esc(o.deliveryAddress || '—')}</td>
      <td style="text-align:center">${items.length}</td>
      <td class="mono">${fmtMoney(total)}</td>
    </tr>`;
  }).join('');
  tbody.querySelectorAll('tr[data-order-id]').forEach(row=>{
    row.addEventListener('click', ()=>openOrderFromUnifiedList(row.dataset.orderId, row.dataset.orderSource));
  });
  if (pendingOpenOrder) {
    const openId = pendingOpenOrder;
    const source = pendingOpenSource;
    pendingOpenOrder = null;
    pendingOpenSource = null;
    if (source === 'client') openCltModal(openId);
    else openAdminOrderModal(openId);
  }
}

function openOrderFromUnifiedList(orderId, source){
  if (source === 'client') return openCltModal(orderId);
  return openAdminOrderModal(orderId);
}

function openAdminOrderModal(id) {
  const o = orders.find(x => x.id === id);
  if (!o) {
    console.error('Supplier could not open Posudamart order details', { id, knownOrders: orders.length });
    showToast('Не удалось открыть заказ. Обновите страницу.', false);
    return;
  }
  const total = (o.items||[]).reduce((s,i)=>s+Number(i.totalPrice||0),0);
  const items = o.items || [];

  document.getElementById('clt-modal-title').textContent = `Заказ Posudamart #${o.number}`;
  document.getElementById('clt-modal-status').innerHTML = statusBadge(o.status);
  document.getElementById('clt-modal-client-info').innerHTML = `
    <div><span style="color:var(--muted);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px">Клиент</span><div style="font-weight:700;margin-top:3px">Posudamart</div></div>
    <div><span style="color:var(--muted);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px">Поставщик</span><div style="font-weight:700;margin-top:3px">${esc(currentSupplier.name||'—')}</div></div>
    <div><span style="color:var(--muted);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px">Дата</span><div style="font-weight:700;margin-top:3px">${esc(o.date)}</div></div>
    <div><span style="color:var(--muted);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px">Адрес доставки</span><div style="font-weight:600;margin-top:3px">${esc(o.delivery_address||'—')}</div></div>
    <div><span style="color:var(--muted);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px">Позиций</span><div style="font-weight:700;margin-top:3px">${items.length}</div></div>
    <div><span style="color:var(--muted);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px">Комментарий</span><div style="font-weight:600;margin-top:3px">${esc(o.comment||'—')}</div></div>
  `;
  document.getElementById('clt-modal-items').innerHTML = items.length ? `
    <div style="overflow-x:auto;border-radius:10px;border:1px solid var(--border)">
      <table style="width:100%;border-collapse:collapse;min-width:440px">
        <thead><tr style="background:var(--surface2)">
          <th style="padding:8px 12px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;text-align:left">Товар</th>
          <th style="padding:8px 12px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;text-align:center">Кор.</th>
          <th style="padding:8px 12px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;text-align:center">Шт/кор</th>
          <th style="padding:8px 12px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;text-align:right">Сумма</th>
        </tr></thead>
        <tbody>${items.map((item,idx)=>{
          const safePhoto = sanitizeImageUrl(item.photo||'');
          const photo = safePhoto
            ? `<span data-safe-image="${safePhoto}" data-alt="${esc(item.productName||'photo')}"></span>`
            : `<div style="width:36px;height:36px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">📦</div>`;
          return `<tr style="${idx>0?'border-top:1px solid var(--border)':''}">
            <td style="padding:10px 12px"><div style="display:flex;align-items:center;gap:10px">${photo}
              <div><div style="font-weight:600;font-size:13px">${esc(item.productName||'—')}</div>
              ${item.sku?`<div style="font-size:11px;color:var(--muted);font-family:var(--mono)">${esc(item.sku)}</div>`:''}</div>
            </div></td>
            <td style="padding:10px 12px;text-align:center;font-weight:700">${item.boxes}</td>
            <td style="padding:10px 12px;text-align:center;color:var(--muted)">${item.unitsPerBox}</td>
            <td style="padding:10px 12px;text-align:right;font-family:var(--mono);font-weight:700">${fmtMoney(item.totalPrice)}</td>
          </tr>`;
        }).join('')}</tbody>
      </table>
    </div>` : '<div class="empty"><div class="empty-icon">📦</div>Товаров нет</div>';
  mountSafeImages(document.getElementById('clt-modal-items'));

  document.getElementById('clt-modal-client-comment-wrap').style.display = 'none';
  document.getElementById('clt-modal-reply-wrap').style.display = 'none';
  document.getElementById('clt-modal-total').textContent = fmtMoney(total);
  document.getElementById('clt-modal-actions').innerHTML = '';
  document.getElementById('clt-order-modal').classList.add('open');
}

// ── Client orders ──
async function loadClientOrders() {
  const res = await sb.from('client_orders').select('*')
    .eq('supplier_id', currentSupplier.id)
    .order('created_at', { ascending: false });
  clientOrders = getSupabaseDataOrThrow(res, 'Заказы клиентов');
  renderUnifiedOrders();
}
['order-search','order-status-filter'].forEach(id => document.getElementById(id).addEventListener('input', renderUnifiedOrders));

function cltStatusBadge(s) {
  const map = {
    'Новый':       'background:rgba(79,110,247,.12);color:var(--accent);border:1px solid rgba(79,110,247,.25)',
    'Изменён':     'background:rgba(245,158,11,.12);color:var(--warning);border:1px solid rgba(245,158,11,.25)',
    'Подтверждён': 'background:rgba(34,197,94,.12);color:var(--success);border:1px solid rgba(34,197,94,.25)',
    'Отменён':     'background:rgba(239,68,68,.12);color:var(--danger);border:1px solid rgba(239,68,68,.25)',
  };
  return `<span style="display:inline-flex;align-items:center;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700;${map[s]||''}">${esc(s)}</span>`;
}

// ── Client order modal ──
let currentCltOrderId = null;

function openCltModal(id) {
  const o = clientOrders.find(x => x.id === id);
  if (!o) {
    console.error('Supplier could not open client order details', { id, knownOrders: clientOrders.length });
    showToast('Не удалось открыть заказ клиента. Обновите страницу.', false);
    return;
  }
  currentCltOrderId = id;
  const total = (o.items||[]).reduce((s,i)=>s+Number(i.totalPrice||0),0);
  const canEdit = o.status === 'Новый' || (o.status === 'Изменён' && o.updated_by !== 'supplier');

  document.getElementById('clt-modal-title').textContent = `Заказ клиента #${o.number}`;
  document.getElementById('clt-modal-status').innerHTML = cltStatusBadge(o.status);
  document.getElementById('clt-modal-total').textContent = fmtMoney(total);

  // Client info (we just show partial id for now)
  document.getElementById('clt-modal-client-info').innerHTML = `
    <div><span style="color:var(--muted);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px">Клиент</span><div style="font-weight:700;margin-top:3px">${esc(o.client_name || o.client_id?.slice(0,8) || 'Клиент')}</div></div>
    <div><span style="color:var(--muted);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px">Поставщик</span><div style="font-weight:700;margin-top:3px">${esc(currentSupplier.name||'—')}</div></div>
    <div><span style="color:var(--muted);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px">Дата заказа</span><div style="font-weight:700;margin-top:3px">${esc(o.created_at?.slice(0,10)||'')}</div></div>
    <div><span style="color:var(--muted);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px">Адрес доставки</span><div style="font-weight:600;margin-top:3px">${esc(o.delivery_address||'—')}</div></div>
    <div><span style="color:var(--muted);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px">Позиций</span><div style="font-weight:700;margin-top:3px">${(o.items||[]).length}</div></div>
    <div><span style="color:var(--muted);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px">Обновил</span><div style="font-weight:600;margin-top:3px">${o.updated_by==='supplier'?'Вы':'Клиент'}</div></div>
    <div><span style="color:var(--muted);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px">Комментарий поставщика</span><div style="font-weight:600;margin-top:3px">${esc(o.supplier_comment||'—')}</div></div>
  `;

  // Items — editable if status is Новый
  const items = o.items || [];
  document.getElementById('clt-modal-items').innerHTML = `
    <div style="overflow-x:auto;border-radius:10px;border:1px solid var(--border)">
      <table style="width:100%;border-collapse:collapse;min-width:480px">
        <thead><tr style="background:var(--surface2)">
          <th style="padding:8px 12px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;text-align:left">Товар</th>
          <th style="padding:8px 12px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;text-align:center">Кор.</th>
          <th style="padding:8px 12px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;text-align:right">Цена/кор</th>
          <th style="padding:8px 12px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;text-align:right">Сумма</th>
        </tr></thead>
        <tbody>${items.map((item, idx) => `
          <tr style="${idx>0?'border-top:1px solid var(--border)':''}">
            <td style="padding:10px 12px">
              <div style="display:flex;align-items:center;gap:10px">
                ${sanitizeImageUrl(item.photo||'')?`<span data-safe-image="${sanitizeImageUrl(item.photo||'')}" data-alt="${esc(item.productName||'photo')}"></span>`:`<div style="width:36px;height:36px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">📦</div>`}
                <div><div style="font-weight:600;font-size:13px">${esc(item.productName||'—')}</div>
                ${item.sku?`<div style="font-size:11px;color:var(--muted);font-family:var(--mono)">${esc(item.sku)}</div>`:''}</div>
              </div>
            </td>
            <td style="padding:10px 12px;text-align:center">
              ${canEdit ? `
                <div style="display:flex;align-items:center;justify-content:center;gap:4px">
                  <button onclick="changeCltBoxes(${idx},-1)" style="width:24px;height:24px;border-radius:5px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);cursor:pointer;font-size:13px">−</button>
                  <input type="number" id="clt-boxes-${idx}" value="${item.boxes}" min="1" step="1" style="width:50px;text-align:center;background:var(--bg);border:1px solid var(--border2);border-radius:5px;color:var(--text);padding:3px 5px;font-size:13px;font-weight:700" oninput="recalcCltRow(${idx})">
                  <button onclick="changeCltBoxes(${idx},1)" style="width:24px;height:24px;border-radius:5px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);cursor:pointer;font-size:13px">+</button>
                </div>` : `<span style="font-weight:700">${item.boxes}</span>`}
            </td>
            <td style="padding:10px 12px;text-align:right">
              ${canEdit ? `<input type="number" id="clt-price-${idx}" value="${item.boxPrice}" min="0" step="0.01" style="width:90px;text-align:right;background:var(--bg);border:1px solid var(--border2);border-radius:5px;color:var(--text);padding:3px 8px;font-size:13px;font-family:var(--mono)" oninput="recalcCltRow(${idx})">` : `<span style="font-family:var(--mono)">${fmtMoney(item.boxPrice)}</span>`}
            </td>
            <td style="padding:10px 12px;text-align:right;font-family:var(--mono);font-weight:700" id="clt-row-sum-${idx}">${fmtMoney(item.totalPrice)}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
  mountSafeImages(document.getElementById('clt-modal-items'));

  // Client comment
  const ccWrap = document.getElementById('clt-modal-client-comment-wrap');
  if (o.client_comment) {
    ccWrap.style.display = 'block';
    document.getElementById('clt-modal-client-comment').textContent = o.client_comment;
  } else { ccWrap.style.display = 'none'; }

  // Supplier comment
  document.getElementById('clt-modal-reply-wrap').style.display = canEdit ? 'block' : 'none';
  document.getElementById('clt-sup-comment').value = o.supplier_comment || '';

  // Actions
  let actions = '';
  if (canEdit) {
    actions += `<button class="btn btn-sm btn-primary" onclick="sendChangesToClient('${id}')">📤 Отправить изменения</button>`;
  }
  if (o.status === 'Подтверждён') {
    actions += `<span style="font-size:13px;color:var(--success);font-weight:700">✅ Клиент подтвердил</span>`;
    actions += `<button class="btn btn-sm" style="background:rgba(245,158,11,0.12);border-color:var(--warning);color:var(--warning)" onclick="closeCltModal();generateSupInvoice('${id}')">🖨 Накладная</button>`;
  }
  if (o.status === 'Отменён') {
    actions += `<span style="font-size:13px;color:var(--danger);font-weight:700">✕ Отменён клиентом</span>`;
  }
  document.getElementById('clt-modal-actions').innerHTML = actions;

  document.getElementById('clt-order-modal').classList.add('open');
}

function closeCltModal() { document.getElementById('clt-order-modal').classList.remove('open'); }
document.getElementById('clt-order-modal').addEventListener('click', e => { if (e.target === document.getElementById('clt-order-modal')) closeCltModal(); });

function changeCltBoxes(idx, delta) {
  const inp = document.getElementById(`clt-boxes-${idx}`);
  inp.value = Math.max(1, (parseInt(inp.value)||1) + delta);
  recalcCltRow(idx);
}

function recalcCltRow(idx) {
  const boxes = Math.max(1, parseInt(document.getElementById(`clt-boxes-${idx}`)?.value)||1);
  const price = parseFloat(document.getElementById(`clt-price-${idx}`)?.value)||0;
  const total = boxes * price;
  document.getElementById(`clt-row-sum-${idx}`).textContent = fmtMoney(total);
  // Recalc grand total
  const o = clientOrders.find(x => x.id === currentCltOrderId);
  if (!o) return;
  let grand = 0;
  (o.items||[]).forEach((item, i) => {
    const b = parseInt(document.getElementById(`clt-boxes-${i}`)?.value)||item.boxes;
    const p = parseFloat(document.getElementById(`clt-price-${i}`)?.value)||item.boxPrice;
    grand += b * p;
  });
  document.getElementById('clt-modal-total').textContent = fmtMoney(grand);
}

async function sendChangesToClient(id) {
  const o = clientOrders.find(x => x.id === id);
  if (!o) return;
  const updatedItems = (o.items||[]).map((item, idx) => {
    const boxes = Math.max(1, parseInt(document.getElementById(`clt-boxes-${idx}`)?.value)||item.boxes);
    const boxPrice = parseFloat(document.getElementById(`clt-price-${idx}`)?.value)||item.boxPrice;
    return { ...item, boxes, boxPrice, totalUnits: boxes*(item.unitsPerBox||1), totalPrice: boxes*boxPrice };
  });
  const supComment = document.getElementById('clt-sup-comment').value.trim();
  const { error } = await sb.from('client_orders').update({
    items: updatedItems,
    status: 'Изменён',
    supplier_comment: supComment,
    updated_by: 'supplier',
    updated_at: new Date().toISOString()
  }).eq('id', id);
  if (error) {
    console.error('sendChangesToClient failed', { id, message: error.message });
    return showToast(error.message, false);
  }
  o.items = updatedItems;
  o.status = 'Изменён';
  o.supplier_comment = supComment;
  closeCltModal();
  renderUnifiedOrders();
  showToast('✅ Изменения отправлены клиенту');
}

// ── Накладная для поставщика ──
async function generateSupInvoice(id) {
  const o = clientOrders.find(x => x.id === id);
  if (!o) return;
  const items = o.items || [];
  const totalBoxes = items.reduce((s,i)=>s+Number(i.boxes||0),0);
  const totalUnits = items.reduce((s,i)=>s+Number(i.totalUnits||0),0);
  const totalPrice = items.reduce((s,i)=>s+Number(i.totalPrice||0),0);

  const rows = items.map((item, idx) => `
    <tr style="border-bottom:1px solid #eee;${idx%2===1?'background:#f9f9fc':''}">
      <td style="padding:8px 6px;color:#888">${idx+1}</td>
      <td style="padding:8px 6px">${item.photo?`<img src="${item.photo}" style="width:40px;height:40px;object-fit:cover;border-radius:6px;border:1px solid #ddd" crossorigin="anonymous">`:'—'}</td>
      <td style="padding:8px 6px;font-weight:600">${esc(item.productName||'—')}</td>
      <td style="padding:8px 6px;color:#555;font-family:monospace;font-size:11px">${esc(item.sku||'—')}</td>
      <td style="padding:8px 6px;text-align:center;font-weight:700">${item.boxes}</td>
      <td style="padding:8px 6px;text-align:center">${item.unitsPerBox}</td>
      <td style="padding:8px 6px;text-align:center;font-weight:600">${item.totalUnits}</td>
      <td style="padding:8px 6px;text-align:right">${Number(item.boxPrice).toLocaleString('ru-RU')} ₸</td>
      <td style="padding:8px 6px;text-align:right;font-weight:700">${Number(item.totalPrice).toLocaleString('ru-RU')} ₸</td>
    </tr>`).join('');

  const html = `<div style="font-family:Arial,sans-serif;color:#111;font-size:12px;padding:28px;width:780px;background:#fff">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
      <h2 style="margin:0;font-size:22px;font-weight:900">Накладная #${o.number}</h2>
      <div style="font-size:10px;color:#888;text-align:right">${new Date().toLocaleString('ru-RU')}</div>
    </div>
    <div style="margin-bottom:16px;padding:12px 16px;background:#f5f5f8;border-radius:8px;line-height:1.9;font-size:12px">
      <b>Поставщик:</b> ${esc(currentSupplier.name)}<br>
      <b>Дата заказа:</b> ${o.created_at?.slice(0,10)||''}<br>
      <b>Статус:</b> ${o.status}<br>
      <b>Сформировано:</b> ${new Date().toLocaleString('ru-RU')}
    </div>
    <table style="width:100%;border-collapse:collapse;margin-bottom:16px">
      <thead><tr style="background:#1e2334;color:#fff">
        <th style="padding:8px 6px;text-align:left;width:24px">№</th>
        <th style="padding:8px 6px;width:48px">Фото</th>
        <th style="padding:8px 6px;text-align:left">Наименование</th>
        <th style="padding:8px 6px;text-align:left;width:80px">Артикул</th>
        <th style="padding:8px 6px;text-align:center;width:40px">Кор.</th>
        <th style="padding:8px 6px;text-align:center;width:40px">Шт/к</th>
        <th style="padding:8px 6px;text-align:center;width:50px">Всего</th>
        <th style="padding:8px 6px;text-align:right;width:80px">Цена/кор.</th>
        <th style="padding:8px 6px;text-align:right;width:80px">Сумма</th>
      </tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr style="background:#e8ecf4;font-weight:bold;font-size:13px">
        <td colspan="4" style="padding:10px 6px;border-top:2px solid #ccc">ИТОГО</td>
        <td style="padding:10px 6px;text-align:center;border-top:2px solid #ccc">${totalBoxes}</td>
        <td style="border-top:2px solid #ccc"></td>
        <td style="padding:10px 6px;text-align:center;border-top:2px solid #ccc">${totalUnits}</td>
        <td style="border-top:2px solid #ccc"></td>
        <td style="padding:10px 6px;text-align:right;border-top:2px solid #ccc;font-size:15px;color:#1e2334">${Number(totalPrice).toLocaleString('ru-RU')} ₸</td>
      </tr></tfoot>
    </table>
    <div style="color:#aaa;font-size:10px;text-align:center">Posudamart — Документ сформирован автоматически</div>
  </div>`;

  showToast('⏳ Генерируем PDF...');
  const wrap = document.createElement('div');
  wrap.style.cssText = 'position:fixed;left:-9999px;top:0;z-index:-1;background:#fff';
  wrap.innerHTML = html;
  document.body.appendChild(wrap);
  try {
    const canvas = await html2canvas(wrap.firstElementChild, {scale:2, useCORS:true, allowTaint:true, backgroundColor:'#fff', logging:false});
    const imgData = canvas.toDataURL('image/jpeg', 0.95);
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
    const pageW=210, pageH=297;
    const imgH = (canvas.height * pageW) / canvas.width;
    let posY=0, page=0;
    while (posY < imgH) { if(page>0) doc.addPage(); doc.addImage(imgData,'JPEG',0,-posY,pageW,imgH); posY+=pageH; page++; }
    const fname = `nakladnaya_${o.number}.pdf`;
    const pdfBlob = doc.output('blob');
    const pdfFile = new File([pdfBlob], fname, {type:'application/pdf'});
    if (navigator.share && navigator.canShare && navigator.canShare({files:[pdfFile]})) {
      await navigator.share({files:[pdfFile], title:fname});
    } else { doc.save(fname); }
    showToast('✅ Накладная сохранена!');
  } catch(e) {
    showToast('Ошибка PDF: ' + e.message, false);
  } finally {
    document.body.removeChild(wrap);
  }
}
</script>
</body>
</html>
